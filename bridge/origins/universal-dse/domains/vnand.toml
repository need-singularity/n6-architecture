name = "vnand"
desc = "V-NAND DSE (셀타입 mu~sopfr 래더, 적층 sigma*J2=288, PCIe n=6.0, BT-170~175/260~266)"

[scoring]
n6 = 0.30
perf = 0.25
power = 0.25
cost = 0.20

