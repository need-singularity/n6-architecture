# ============================================================
# 호환성 규칙
# ============================================================

# PLC/HLC는 512층 이상 필요 (고밀도 보상)
[[rule]]
type = "require"
if_level = 0
if_id = "PLC"
then_level = 1
then_ids = ["Layer-512", "Layer-1024"]

[[rule]]
type = "require"
if_level = 0
if_id = "HLC"
then_level = 1
then_ids = ["Layer-1024"]

# 1024층은 2D 소재 또는 IGZO 채널 필요
[[rule]]
type = "require"
if_level = 1
if_id = "Layer-1024"
then_level = 2
then_ids = ["2D-Material", "IGZO-Channel"]

# 24채널 컨트롤러는 서버/데이터센터 전용
[[rule]]
type = "exclude"
if_level = 3
if_id = "24ch-Datacenter"
then_level = 5
then_ids = ["Client-2TB"]

# SLC는 클라이언트 비용 비호환
[[rule]]
type = "exclude"
if_level = 0
if_id = "SLC"
then_level = 5
then_ids = ["Client-2TB", "Datacenter-16TB"]

# UCIe 인터페이스는 SmartSSD/데이터센터 전용
[[rule]]
type = "exclude"
if_level = 4
if_id = "UCIe"
then_level = 5
then_ids = ["Client-2TB"]
