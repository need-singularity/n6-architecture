# V-NAND 플래시 메모리 DSE — HEXA-VNAND
# n=6: 셀타입 mu~sopfr, 적층 sigma*J2=288층, PCIe 6.0, 4TB=2^sigma
# 6단 DSE: 셀타입 x 적층 x 소재 x 컨트롤러 x 인터페이스 x 시스템

