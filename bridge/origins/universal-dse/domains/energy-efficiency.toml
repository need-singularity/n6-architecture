[meta]
name = "energy-efficiency"
desc = "에너지 효율 최적화 DSE (건물/산업/수송/조명/냉난방)"
levels = ["Building", "Industrial", "Transport", "Lighting", "HVAC"]
vision = "n=6 에너지 효율 — 6대 섹터 통합, COP=n/phi=3 히트펌프, LED 6배 효율"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

