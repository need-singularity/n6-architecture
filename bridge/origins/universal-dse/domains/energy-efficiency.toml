# ============================================================
# 호환성 규칙
# ============================================================

# 패시브하우스는 ERV 환기 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PassiveHouse"
then_level = 4
then_ids   = "ERV,HeatPump_COP3"

# 제로에너지빌딩은 스마트 조명 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "ZEB"
then_level = 3
then_ids   = "LED_6500K,SmartLighting,Daylight"

# CHP는 흡수식 냉동기 선호 (폐열 활용)
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "CHP"
then_level = 4
then_ids   = "AbsorptionChiller"

# eVTOL은 산업 VFD와 호환 불가 (스케일 불일치)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "eVTOL"
then_level = 1
then_ids   = "ProcessInteg,CHP"
