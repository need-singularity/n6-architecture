# =============================================================
# 에너지 효율 DSE 도메인 정의
# 에너지 소비 최적화 — 건물·산업·수송·조명·냉난방
# n=6: 6대 소비 섹터, sigma=12 효율 등급, Carnot COP=n/phi=3
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
