# =============================================================
# 호환성 규칙
# =============================================================

# 습식 접기는 화지 또는 한지 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Wet_Fold"
then_level = 1
then_ids   = "Washi_Japanese,Hanji_Korean,Tant_Textured"

# 모듈러는 강체 수학과 최적 조합
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Modular_Unit"
then_level = 3
then_ids   = "Rigid_Origami,Flat_Foldability"

# 구김 접기는 테셀레이션 수학과 비호환
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Crumple_Organic"
then_level = 3
then_ids   = "Kawasaki_Thm,Maekawa_Thm"
