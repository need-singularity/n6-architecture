# =============================================================
# N6 칩 아키텍처 3단계: 3D 적층 DSE
# 칩 6단계 로드맵: HEXA-1 → PIM → [3D-적층] → Photonic → Wafer-Scale → Superconducting
# n=6: sigma=12 TSV층, tau=4 다이 스택, J2=24 um TSV 피치,
#       sigma*tau=48 TSV/mm2, phi=2 본딩면, n=6 열방산 경로
# BT-28 (컴퓨팅 사다리) + BT-37 (피치) + BT-55 (HBM) + BT-69 (칩렛)
# 총 조합: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "chip-3d-stack"
desc = "3D 적층 칩 아키텍처 DSE — 수직 통합 (칩 6단계 3단)"
levels = ["StackTech", "Interconnect", "ThermalMgmt", "MemoryInteg", "DiePartition"]
vision = "n=6 정렬 3D — 수직 적층으로 면적 효율 극대화, sigma=12 TSV층, tau=4 다이"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

