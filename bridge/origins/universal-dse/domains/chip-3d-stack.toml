# =============================================================
# 호환성 규칙
# =============================================================

# 하이브리드 본딩은 고밀도 TSV/광 인터커넥트에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Hybrid_Bond"
then_level = 1
then_ids   = "TSV_high_density,Optical_TSV"

# 모놀리식 3D는 후면 전력망 필수
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Monolithic_3D"
then_level = 1
then_ids   = "Backside_PDN"

# 고밀도 TSV 사용 시 마이크로채널 냉각 권장
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "TSV_high_density"
then_level = 2
then_ids   = "MicroChannel_6,Diamond_ILD"

# HBM4 12적층은 CoWoS 인터포저에 최적
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "HBM4_12hi"
then_level = 0
then_ids   = "CoWoS_sigma12,TSV_Cu"

# 모놀리식 SoC는 3D SRAM 캐시에 최적
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Monolithic_SoC"
then_level = 3
then_ids   = "Cache_3D,Unified_3D"

# 칩렛 12개 구성은 능동 인터포저와 CoWoS에 최적
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Chiplet_12"
then_level = 0
then_ids   = "CoWoS_sigma12,Die_to_Wafer"

# 광 TSV는 열 관리 부담 최소 — 열전 소자로 충분
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Optical_TSV"
then_level = 2
then_ids   = "Thermoelectric,TIM_12zone"

# FOWLP은 저비용 다이 분할에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "FOWLP"
then_level = 4
then_ids   = "Tile_6,IO_48lane"

# 유도 결합은 메모리 분리 통합에 적합
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Inductive_coupling"
then_level = 3
then_ids   = "Logic_on_Mem,CXL_3D"

# ReRAM 3D는 모놀리식 3D 적층에 최적
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "ReRAM_3D"
then_level = 0
then_ids   = "Monolithic_3D,Hybrid_Bond"
