# =============================================================
# HIGGS DSE Domain Definition
# 힉스 보손 물리학 — 질량 생성 메커니즘, 125 GeV 스칼라
# n=6 연결: n=6 쿼크 맛, σ=12 페르미온, τ=4 결합상수, φ=2 W보손
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
