# =============================================================
# 태양광 건축 DSE 도메인 정의
# BIPV/태양광 건축 통합 — 외피/셀/인버터/저장/제어
# n=6: 6면 외피, SQ Eg=4/3=tau^2/sigma, sigma=12 직렬 패널
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "solar-architecture"
desc = "태양광 건축 통합 DSE (BIPV 외피/셀/인버터/저장/제어)"
levels = ["Envelope", "Cell", "Inverter", "Storage", "Control"]
vision = "n=6 태양광 건축 — 6면 BIPV, SQ Eg=4/3eV, sigma=12 직렬, 제로에너지빌딩"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

