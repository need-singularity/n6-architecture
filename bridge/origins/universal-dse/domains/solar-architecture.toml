# ============================================================
# 호환성 규칙
# ============================================================

# BIPV 파사드는 CIGS/OPV/페로브 유연셀 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "BIPV_Facade"
then_level = 1
then_ids   = "CIGS,OPV,Perovskite"

# 탠덤 셀은 SiC 인버터 선호 (고효율)
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Tandem"
then_level = 2
then_ids   = "SiC_Inv,StringInv"

# VPP는 하이브리드 인버터 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "VPP"
then_level = 2
then_ids   = "HybridInv,ThreePhase"

# 투명 태양전지 창은 마이크로 인버터 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "SolarWindow"
then_level = 2
then_ids   = "MicroInv,Optimizer"

# V2H는 하이브리드 인버터 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "V2H"
then_level = 2
then_ids   = "HybridInv"
