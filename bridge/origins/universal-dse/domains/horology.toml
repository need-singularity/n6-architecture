# =============================================================
# 호환성 규칙
# =============================================================

# 투르비용은 고급 소재 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Tourbillon"
then_level = 2
then_ids   = "Gold_18K,Sapphire_Crystal,Silicon_Hairspring"

# 그랜드 컴플리케이션은 COSC 이상 정밀도 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Grand_Complication"
then_level = 3
then_ids   = "COSC_Cert,METAS_Master,Gyromax"

# 쿼츠는 오트 올로주리와 비호환
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Quartz_32k"
then_level = 4
then_ids   = "Haute_Horlogerie"
