# ============================================================
# 호환성 규칙
# ============================================================

# 핵융합은 고급 변환(브레이턴/연료전지) 필요
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Nuclear"
then_level = 1
then_ids   = "Turbine_Rankine,Brayton_SCO2"

# 수소 발전원은 연료전지 변환 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Hydrogen"
then_level = 1
then_ids   = "FuelCell,Brayton_SCO2"

# HVDC 그리드는 대규모 발전원 필요
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "HVDC_Grid"
then_level = 0
then_ids   = "Geothermal,Biomass"

# PUE 1.2 최적화는 DC 체인 분배 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "PUE_1_2"
then_level = 3
then_ids   = "DC_Chain,SmartGrid"

# 태양광은 리튬이온 저장 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Solar"
then_level = 2
then_ids   = "LiIon_6S,FlowBattery"
