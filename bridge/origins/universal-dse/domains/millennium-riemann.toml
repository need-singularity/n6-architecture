# =============================================================
# 호환성 규칙
# =============================================================

# 엡슈타인 제타는 일반 RH와 다름 (반례 존재)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Epstein_Zeta"
then_level = 4
then_ids   = "Numerical_10T,Turing_Method"

# 하세-바일 L-함수는 해석적 계수 검증과 호환
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Hasse_Weil"
then_level = 4
then_ids   = "Analytic_Rank,Heuristic_RH"

# 리 판정법은 수치 검증과 호환 최적
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Li_Criterion"
then_level = 4
then_ids   = "Numerical_10T,Odlyzko_Algo"
