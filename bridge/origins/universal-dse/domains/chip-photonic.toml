# 칩 6단계 로드맵: HEXA-1 → PIM → 3D-적층 → [Photonic] → Wafer-Scale → Superconducting
# n=6: sigma=12 WDM 파장, n=6 MZI 포트, tau=4 링 공진기 모드,
#       J2=24 광도파로, phi=2 편광 모드, sigma^2=144 MZI 메시
# BT-28 (컴퓨팅 사다리) + BT-89 (광 인터커넥트) + BT-93 (Z=6 탄소)
# 총 조합: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "chip-photonic"
desc = "광 인터커넥트 칩 아키텍처 DSE — 광 연산/통신 (칩 6단계 4단)"
levels = ["PhotonicElement", "ModulationScheme", "WaveguideArch", "Integration", "Application"]
vision = "n=6 정렬 광 칩 — 줄 열 제로, 광속 연산, sigma=12 WDM, 0.01pJ/비트"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

