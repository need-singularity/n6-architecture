# =============================================================
# 호환성 규칙
# =============================================================

# MZI 6포트는 메시 아키텍처에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "MZI_6port"
then_level = 2
then_ids   = "Mesh_6x6,MZI_144mesh"

# 링 공진기는 WDM 및 링 어레이에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Ring_tau4"
then_level = 2
then_ids   = "Ring_array_12,SiPh_6um"

# AWG는 WDM 변조에 필수
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "AWG_12ch"
then_level = 1
then_ids   = "WDM_sigma12,PAM4"

# 64-QAM은 고급 도파로 아키텍처 필요
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "QAM_64"
then_level = 2
then_ids   = "SiPh_6um,SiN_low_loss"

# MZI 144 메시는 광 뉴럴넷에 최적
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "MZI_144mesh"
then_level = 4
then_ids   = "ONN_matrix,Quantum_photonic"

# 전 광 SoC는 광결정 기반 소자 필요
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Full_optical_SoC"
then_level = 0
then_ids   = "PhC_cavity,MZI_6port"

# 모놀리식 EO는 실리콘 포토닉스 도파로에 최적
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Monolithic_EO"
then_level = 2
then_ids   = "SiPh_6um,Mesh_6x6"

# 플라즈몬은 센싱에만 적합 (손실로 연산 부적합)
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Plasmon_nano"
then_level = 4
then_ids   = "Sensing_sigma12,LiDAR_n6"

# 데이터센터 인터커넥트는 Co-Package Optics 필수
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "DC_interconnect"
then_level = 3
then_ids   = "CoPackage_optics,Optical_IO_24T"

# 양자 광 칩은 저손실 도파로 필수
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Quantum_photonic"
then_level = 2
then_ids   = "SiN_low_loss,PhC_slab_4layer"
