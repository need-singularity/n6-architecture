# =============================================================
# 호환성 규칙
# =============================================================

# 열적외선만으로는 BEV 퓨전 불가
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Infrared_Thermal"
then_level = 1
then_ids   = "BEV_Fusion"

# 규칙 기반 계획은 적응 제어와 비호환
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Rule_Based"
then_level = 3
then_ids   = "Neural_Control"

# 세계 모델 계획은 트랜스포머 퓨전 필요
[[rule]]
type       = "require"
if_level   = 2
if_id      = "World_Model"
then_level = 1
then_ids   = "Transformer_Fusion,BEV_Fusion,Occupancy_Network"

# ASIL-D는 이중화 제어 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "ISO26262_ASILD"
then_level = 3
then_ids   = "MPC_Predictive,Steer_By_Wire"
