# ============================================================
# 호환성 규칙
# ============================================================

# 데이터센터(흡입형 감지)는 가스소화+준비작동 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Aspirating"
then_level = 2
then_ids   = "GasAgent,PreAction"

# CO2 소화는 피난 안전구역 필수 (질식 위험)
[[rule]]
type       = "require"
if_level   = 2
if_id      = "CO2_System"
then_level = 3
then_ids   = "PressuredStair,SmokeControl"

# 고층(피난안전구역)은 방화구획 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "RefugeFloor"
then_level = 4
then_ids   = "FireBarrier"

# 포소화는 유류(HRR 설계) 화재 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Foam"
then_level = 0
then_ids   = "HRR,ClassABC"

# AI 화재탐지는 피난 시뮬레이션 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "AI_Detection"
then_level = 3
then_ids   = "EvacSimul,SmokeControl"
