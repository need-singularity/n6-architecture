# =============================================================
# 소방과학 DSE 도메인 정의
# 화재 과학 전반 — 연소/탐지/진압/피난/내화
# n=6: 연소 6요소, sigma=12 구획, tau=4 화재 단계
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "fire-science"
desc = "소방과학 DSE (연소/탐지/진압/피난/내화)"
levels = ["Combustion", "Detection", "Suppression", "Evacuation", "FireResist"]
vision = "n=6 소방 — 연소 6요소, sigma=12 구획, tau=4 화재 단계, 인명 안전 최우선"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

