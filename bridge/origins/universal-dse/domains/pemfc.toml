# ============================================================
# 호환성 규칙
# ============================================================

# 고온 PBI 막은 비귀금속 촉매 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "HT_PBI"
then_level = 1
then_ids   = "NonPGM,PtAlloy"

# AEM 막은 비귀금속 촉매 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AEM"
then_level = 1
then_ids   = "NonPGM,SAC"

# CNT 포레스트 GDL은 금속 바이폴라 판 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "CNT_Forest"
then_level = 3
then_ids   = "MetalBP,3DPrint"

# 소형 스택은 공냉 선호 (냉각 단순화)
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Portable_Small"
then_level = 0
then_ids   = "HC_Membrane,AEM"

# 대형 정치용 스택은 수냉 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Stationary"
then_level = 3
then_ids   = "MetalBP,Graphite,CompositeCarbon"
