# =============================================================
# PEMFC (고분자전해질막 연료전지) DSE 도메인 정의
# 수소 연료전지 핵심 — 막/촉매/가스확산층/바이폴라판/스택
# n=6: 6셀 단위 스택, sigma=12 유로 채널, tau=4 작동 조건
# C Z=6 탄소 담지체, 백금 촉매, 나피온 막
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "pemfc"
desc = "PEMFC 연료전지 DSE (막/촉매/GDL/바이폴라판/스택)"
levels = ["Membrane", "Catalyst", "GDL", "BipolarPlate", "Stack"]
vision = "n=6 PEMFC — 6셀 스택 단위, Carbon Z=6 담지체, sigma=12 유로 채널"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

