# =============================================================
# 열역학 DSE 도메인 정의
# 열역학 법칙 기반 설계 — 사이클/상전이/통계역학/비평형/응용
# n=6: 6 상태량 (P,V,T,S,U,H), tau=4 법칙 (0~3), Carnot 효율
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "thermodynamics"
desc = "열역학 통합 DSE (사이클/상전이/통계역학/비평형/응용)"
levels = ["Cycle", "PhaseTransition", "StatMech", "Nonequilibrium", "Application"]
vision = "n=6 열역학 — 6 상태량, tau=4 법칙, sigma=12 자유도, Carnot 효율 n/phi=3"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

