# ============================================================
# 호환성 규칙
# ============================================================

# 랭킨 사이클은 비등/응축 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Rankine"
then_level = 1
then_ids   = "Boiling,Condensation"

# 카르노 사이클은 모든 통계역학 호환
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Carnot"
then_level = 2
then_ids   = "Maxwell_Boltzmann,FermiDirac,BoseEinstein"

# 초임계 상전이는 브레이턴 사이클 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Supercritical"
then_level = 0
then_ids   = "Brayton"

# 분자동역학은 발전소 설계와 비호환 (스케일 불일치)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "MolDynamics"
then_level = 4
then_ids   = "PowerPlant,Refrigeration"

# 프리고진 산일구조는 생물/기후 응용 선호
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Prigogine"
then_level = 2
then_ids   = "Ising,MonteCarlo"
