# =============================================================
# 광학 DSE 도메인 정의
# 광학 기초 + 응용 — 광원/렌즈계/검출기/파이버/응용
# n=6: 6면 프리즘, sigma=12 파장대(UV~FIR), 가시광 6색=n
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "optics"
desc = "광학 통합 DSE (광원/렌즈계/검출기/파이버/응용)"
levels = ["LightSource", "OpticalSystem", "Detector", "FiberOptics", "Application"]
vision = "n=6 광학 — 6색 가시광, 6면 프리즘, sigma=12 파장대, 파동광학+기하광학 통합"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

