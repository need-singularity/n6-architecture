# ============================================================
# 호환성 규칙
# ============================================================

# 펨토초 레이저는 비선형/양자 응용 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "FemtoLaser"
then_level = 4
then_ids   = "QuantumOptics,LaserMfg,Spectroscopy"

# 방사광은 현미경/분광 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "SynchrotronX"
then_level = 4
then_ids   = "Microscopy,Spectroscopy"

# SPAD 검출기는 양자광학 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "SPAD"
then_level = 4
then_ids   = "QuantumOptics,LiDAR"

# PCF 광섬유는 펨토초 레이저 선호
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "PCF"
then_level = 0
then_ids   = "FemtoLaser,Laser_Diode"

# 광통신은 단일모드 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Telecom"
then_level = 3
then_ids   = "SMF,HollowCore"
