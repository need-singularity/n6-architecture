# =============================================================
# 열 관리 DSE 도메인 정의
# 열 설계 전반 — 냉각/방열/열전달/단열/열저장
# n=6: 6면 방열, sigma=12 히트파이프, tau=4 열전달 모드, 6상 냉매
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "thermal-management"
desc = "열 관리 통합 DSE (냉각/방열/열전달/단열/열저장)"
levels = ["CoolingSys", "HeatSink", "HeatTransfer", "Insulation", "ThermalStorage"]
vision = "n=6 열 관리 — 6면 방열, sigma=12 히트파이프, tau=4 열전달 모드 통합"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

