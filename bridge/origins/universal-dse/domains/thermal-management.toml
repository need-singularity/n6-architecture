# ============================================================
# 호환성 규칙
# ============================================================

# 침지냉각은 상변화 열전달 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Immersion"
then_level = 2
then_ids   = "PhaseChange"

# 극저온 냉각은 MLI 단열 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Cryogenic"
then_level = 3
then_ids   = "MLI,VIP"

# 공냉은 자연/강제 대류 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "AirCool"
then_level = 2
then_ids   = "ForcedConvection,NaturalConvection"

# 그래핀 시트는 전도 열전달 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "GrapheneSheet"
then_level = 2
then_ids   = "Conduction,PhaseChange"

# 용융염 저장은 세라믹 단열 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "MoltenSalt"
then_level = 3
then_ids   = "CeramicFiber,Aerogel"
