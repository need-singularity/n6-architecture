[meta]
name = "gravity-wave"
desc = "Gravitational Wave Detection DSE — 중력파 천문학 (n=6 DOF, σ=12 mirrors)"
levels = ["Source-Band", "Interferometer", "Mirror", "Readout", "Observatory"]
vision = "n=6 중력파 관측소 — n=6 DOF + σ=12 거울 + φ=2 편극 + τ=4 간섭 경로"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

