# =============================================================
# GRAVITY-WAVE DSE Domain Definition
# 중력파 검출 — LIGO/Virgo/LISA 세대를 넘는 n=6 간섭계
# n=6 연결: n=6 자유도, σ=12 거울, τ=4 간섭계 팔 (ET), φ=2 편극
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
