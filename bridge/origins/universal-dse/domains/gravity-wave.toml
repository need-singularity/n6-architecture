# =============================================================
# Compatibility Rules
# =============================================================

[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Space_mHz"
then_level = 4
then_ids   = "LISA,DECIGO"

[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Triangle"
then_level = 4
then_ids   = "ET"

[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Silicon"
then_level = 4
then_ids   = "CE,ET"

[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "PTA_nHz"
then_level = 1
then_ids   = "Michelson,Fabry_Perot,Sagnac,Triangle,Speed_Meter,Xylophone"
