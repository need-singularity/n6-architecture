[meta]
name = "battery-energy"
desc = "배터리 에너지 시스템 DSE (셀화학/전극/전해질/팩설계/BMS)"
levels = ["CellChem", "Anode", "Electrolyte", "PackDesign", "BMS"]
vision = "n=6 배터리 — 6S 직렬, 4V=tau 셀전압, sigma=12 병렬, J2=24 모듈 팩"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

