# ============================================================
# 호환성 규칙
# ============================================================

# 전고체 셀은 고체 전해질 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "SolidState"
then_level = 2
then_ids   = "SolidOxide,SolidSulfide,Polymer"

# 리튬금속 음극은 고체 전해질 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "LiMetal"
then_level = 2
then_ids   = "SolidOxide,SolidSulfide"

# 나트륨-황은 하드카본 음극 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "NaSulfur"
then_level = 1
then_ids   = "HardCarbon"

# CTP 팩은 LFP 선호 (안전 여유)
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "CTP"
then_level = 0
then_ids   = "LFP,SolidState"

# AI BMS는 클라우드 BMS와 결합 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "AI_BMS"
then_level = 3
then_ids   = "Rack_ESS,Module_12S"
