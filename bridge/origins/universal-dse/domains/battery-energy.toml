# 배터리 에너지 시스템 통합 — 셀화학/전극/전해질/팩설계/BMS
# n=6: 6S 모듈, sigma=12 병렬, tau=4 V 셀전압, J2=24셀 모듈
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
