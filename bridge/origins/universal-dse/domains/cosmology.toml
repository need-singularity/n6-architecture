# =============================================================
# 호환성 규칙
# =============================================================

# 수정 중력은 람다CDM 표준 시뮬레이션과 비호환
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Modified_Gravity"
then_level = 3
then_ids   = "N_Body,Boltzmann_Solver"

# 원시 블랙홀은 중력파 관측 필요
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Primordial_BH"
then_level = 2
then_ids   = "GW_Standard,Weak_Lensing"

# 격자 인플레이션은 인플레이션 시대 모형 필요
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Lattice_Inflation"
then_level = 0
then_ids   = "Inflation"

# B-모드 편광은 CMB 위성 관측 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "B_Mode_Pol"
then_level = 2
then_ids   = "CMB_Satellite"
