# =============================================================
# 호환성 규칙
# =============================================================

# mRNA 백신은 신항원 표적 필수
[[rule]]
type       = "require"
if_level   = 2
if_id      = "mRNA_Vaccine"
then_level = 1
then_ids   = "Neoantigen,Immune_Checkpoint"

# LNP 전달은 mRNA 백신과 최적 호환
[[rule]]
type       = "require"
if_level   = 3
if_id      = "LNP"
then_level = 2
then_ids   = "mRNA_Vaccine,Immunotherapy"

# 양성자 치료는 국소 전달 불필요
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Proton_Therapy"
then_level = 3
then_ids   = "Hydrogel_Depot,LNP"

# 디지털 쌍둥이는 다중 오믹스 진단 필요
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Digital_Twin"
then_level = 0
then_ids   = "Multi_Omics,NGS_Panel"
