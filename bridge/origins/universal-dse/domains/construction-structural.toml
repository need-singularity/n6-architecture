[meta]
name = "construction-structural"
desc = "건설 구조 DSE (기초/골조/접합/마감/품질)"
levels = ["Foundation", "Frame", "Connection", "Envelope", "QualityControl"]
vision = "n=6 건설 구조 — 6층 기준, sigma=12 안전율, 6면체 FEM, 내진+내구"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

