# ============================================================
# 호환성 규칙
# ============================================================

# RC 전단벽은 PC 패널 외피 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "RC_ShearWall"
then_level = 3
then_ids   = "PrecastPanel,CurtainWall"

# CLT 목구조는 건식 접합 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "CLT_Mass"
then_level = 2
then_ids   = "DryConnect,BoltedFriction"

# 커튼월은 철골 프레임 선호
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "CurtainWall"
then_level = 1
then_ids   = "Steel_Moment,Steel_Braced"

# CIP 대구경 말뚝은 재하시험 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "CIP_Pile"
then_level = 4
then_ids   = "LoadTest,NDT"

# PC 프리캐스트는 BIM 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "PC_Precast"
then_level = 4
then_ids   = "BIM,DroneSurvey"
