# ============================================================
# 호환성 규칙
# ============================================================

# ESM은 탄소 순환 모니터링 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "ESM"
then_level = 3
then_ids   = "CO2_Monitor,Emission,CarbonSink"

# 빙상 역학은 해수면 상승 모델 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "IceSheet"
then_level = 1
then_ids   = "SeaLevel,OGCM"

# CCUS는 배출 인벤토리 기반 선호
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "CCUS"
then_level = 0
then_ids   = "ESM,GCM_Full"

# AI 기상은 조기경보 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "AI_Weather"
then_level = 4
then_ids   = "EarlyWarning,FloodDefense"
