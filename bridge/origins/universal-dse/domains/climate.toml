# =============================================================
# 기후 DSE 도메인 정의
# 기후 시스템 전반 — 대기/해양/빙권/탄소/적응
# n=6: 6대 온실가스, sigma=12 기후모델 레이어, tau=4 계절
# CO2 Carbon Z=6, 파리협정 목표 연계
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "climate"
desc = "기후 시스템 DSE (대기/해양/빙권/탄소/적응)"
levels = ["Atmosphere", "Ocean", "Cryosphere", "CarbonCycle", "Adaptation"]
vision = "n=6 기후 — CO2 Carbon Z=6, 6대 온실가스, sigma=12 GCM 레이어, tau=4 계절"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

