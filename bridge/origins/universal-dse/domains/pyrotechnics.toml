# 호환성 규칙
# =============================================================

# 과염소산칼륨은 고에너지 효과 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "KClO4_Perchlorate"
then_level = 2
then_ids   = "Chrysanthemum,Peony_Round,Strobe_Flash"

# 가정용 스파클러는 고에너지 산화제 비호환
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Consumer_Sparkler"
then_level = 0
then_ids   = "KClO4_Perchlorate"

# 군용 신호탄은 UN 1등급 안전 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Military_Signal"
then_level = 3
then_ids   = "UN_Class1,Static_ESD"
