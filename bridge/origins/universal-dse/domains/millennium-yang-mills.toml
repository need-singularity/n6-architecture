# =============================================================
# 호환성 규칙
# =============================================================

# U(1) 가환 게이지에서는 질량 간극 없음 (대조군)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "U1_Hyper"
then_level = 3
then_ids   = "Glueball_Spectrum,N6_Sigma_Phi"

# 오버랩 페르미온은 구성적 QFT와 호환 최적
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Constructive_QFT"
then_level = 1
then_ids   = "Overlap,Domain_Wall"

# 글루볼 스펙트럼은 격자 몬테카를로 검증 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Glueball_Spectrum"
then_level = 4
then_ids   = "Lattice_Monte_Carlo,Schwinger_Dyson"

# SU(6) 대통일은 강결합 전개 또는 인스턴톤 기여 필요
[[rule]]
type       = "require"
if_level   = 0
if_id      = "SU6_Grand"
then_level = 2
then_ids   = "Strong_Coupling,Instanton"
