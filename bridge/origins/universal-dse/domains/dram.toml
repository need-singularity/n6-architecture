# ============================================================
# 호환성 규칙
# ============================================================

# 3D DRAM은 웨이퍼 본딩 공정 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "3D_DRAM"
then_level = 2
then_ids   = "WaferBond,BackgrindTSV"

# HBM 패키지는 HBM 인터페이스 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "HBM"
then_level = 4
then_ids   = "HBM_IF,PIM_IF"

# GDDR6은 DDR5 인터페이스와 호환 불가
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "GDDR6"
then_level = 4
then_ids   = "DDR5_IF,CXL_IF"

# EUV 리소는 3D DRAM+IGZO 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "EUV_Litho"
then_level = 0
then_ids   = "3D_DRAM,IGZO_TFT"

# CXL 모듈은 CXL 인터페이스 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "CXL_Module"
then_level = 4
then_ids   = "CXL_IF"
