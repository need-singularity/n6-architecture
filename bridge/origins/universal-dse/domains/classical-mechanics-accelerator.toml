# ============================================================
# 호환성 규칙
# ============================================================

# 싱크로트론은 사극자+6극자 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Synchrotron"
then_level = 1
then_ids   = "Quadrupole,Sextupole"

# 사이클로트론은 동위원소/의료 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Cyclotron"
then_level = 4
then_ids   = "Isotope,MedicalTherapy"

# 웨이크필드 가속은 플라즈마 렌즈 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Wakefield"
then_level = 1
then_ids   = "PlasmaLens"

# HEP 충돌기는 Si 트래커+칼로리미터 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HEP_Collider"
then_level = 2
then_ids   = "SiTracker,Calorimeter"

# 선형 가속기는 FEL 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Linac"
then_level = 4
then_ids   = "FEL,Synchrotron_Light"
