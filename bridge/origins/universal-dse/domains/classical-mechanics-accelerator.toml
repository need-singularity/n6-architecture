# =============================================================
# 고전역학-가속기 DSE 도메인 정의
# 입자 가속기 물리 + 고전역학 기반 — 가속/집속/검출/제어/응용
# n=6: 6극 보정자석, sigma=12 섹터, 6자유도 빔 위상공간
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "classical-mechanics-accelerator"
desc = "가속기 물리+고전역학 DSE (가속/집속/검출/제어/응용)"
levels = ["Acceleration", "Focusing", "Detection", "BeamControl", "Application"]
vision = "n=6 가속기 — 6극 보정, sigma=12 섹터, 6자유도 위상공간, 고에너지 물리"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

