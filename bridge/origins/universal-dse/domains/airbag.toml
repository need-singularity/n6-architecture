# ============================================================
# 호환성 규칙
# ============================================================

# AI ACU는 센서 퓨전 또는 카메라 AI 필요
[[rule]]
type = "require"
if_level = 1
if_id = "AI-ACU"
then_level = 0
then_ids = ["Fusion-12ch", "Camera-AI"]

# 적응형 다중 인플레이터는 적응형 ACU 이상 필요
[[rule]]
type = "require"
if_level = 2
if_id = "Adaptive-Multi"
then_level = 1
then_ids = ["Adaptive-ACU", "AI-ACU"]

# 기본 ACU는 운전석/조수석만 제어 가능
[[rule]]
type = "exclude"
if_level = 1
if_id = "Basic-ACU"
then_level = 4
then_ids = ["Side-12L", "Curtain-24L", "Knee-6L", "Center-6L"]

# 스마트 원단은 AI ACU 또는 센서 퓨전과 연동 필요
[[rule]]
type = "require"
if_level = 3
if_id = "SmartFabric"
then_level = 0
then_ids = ["Fusion-12ch", "Camera-AI"]

# 냉가스 인플레이터는 대형 에어백 비호환 (팽창력 부족)
[[rule]]
type = "exclude"
if_level = 2
if_id = "Cold-Gas"
then_level = 4
then_ids = ["Passenger-120L", "Curtain-24L"]
