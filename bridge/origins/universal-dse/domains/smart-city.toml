# ============================================================
# 호환성 규칙
# ============================================================

# 자율주행은 스마트 교통관리 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AutonomousFleet"
then_level = 3
then_ids   = "SmartCCTV,CyberSecurity"

# 도시 디지털 트윈은 모든 센서 데이터 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "DigitalTwin"
then_level = 2
then_ids   = "AirQualityNet,WaterQuality,FloodAlert"

# UAM은 스마트 가로등 선호 (버티포트 연계)
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "UAM"
then_level = 1
then_ids   = "SmartStreetLight,DistEnergy"

# 비상 통신은 재난 관리 필수 연동
[[rule]]
type       = "require"
if_level   = 3
if_id      = "EmergencyComm"
then_level = 3
then_ids   = "DisasterMgmt"
