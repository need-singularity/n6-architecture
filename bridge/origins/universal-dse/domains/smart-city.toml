desc = "스마트시티 통합 DSE (교통/에너지/환경/안전/서비스)"
levels = ["SmartMobility", "SmartEnergy", "SmartEnviron", "SmartSafety", "SmartService"]
vision = "n=6 스마트시티 — 6대 축 통합, sigma=12 센서, tau=4 데이터 레이어, 시민 중심"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

