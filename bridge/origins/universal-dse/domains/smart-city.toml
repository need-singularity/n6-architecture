# 스마트시티 DSE 도메인 정의
# 도시 지능화 — 교통/에너지/환경/안전/서비스
# n=6: 6대 스마트 축, sigma=12 센서 유형, tau=4 데이터 레이어
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
