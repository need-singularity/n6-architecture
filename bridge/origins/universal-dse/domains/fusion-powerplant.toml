# =============================================================
# 호환성 규칙
# =============================================================

# ICF 레이저는 자기 가둠 가열 불필요
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "ICF_Laser"
then_level = 1
then_ids   = "NBI,ICRH,ECRH,LHCD,Ohmic"

# 알파 자기가열은 토카막/스텔러레이터에서만 유의미
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Alpha_Self"
then_level = 0
then_ids   = "Tokamak,Stellarator,Spherical_Tokamak"

# SiC 구조는 고온 사이클과 호환
[[rule]]
type       = "require"
if_level   = 2
if_id      = "SiC_Advanced"
then_level = 3
then_ids   = "Brayton_He,sCO2_Brayton,Combined_Cycle"

# MHD 직접 발전은 ICF 또는 FRC와 호환
[[rule]]
type       = "require"
if_level   = 3
if_id      = "MHD_Direct"
then_level = 0
then_ids   = "ICF_Laser,FRC"
