# =============================================================
# Compatibility Rules
# =============================================================

# High_Altitude requires Acclimatization (고소 등반엔 적응 필수)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "High_Altitude"
then_level = 3
then_ids   = "Acclimatization"

# Solo_Expedition excludes Siege_Style (단독은 포위 등정 불가)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Solo_Expedition"
then_level = 4
then_ids   = "Siege_Style,Commercial_Guided"

# Ice_Climbing requires Ice_Tool + Boot_Crampon
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Ice_Climbing"
then_level = 1
then_ids   = "Ice_Tool,Boot_Crampon"

# Alpine_Style prefers lightweight gear
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Alpine_Style"
then_level = 1
then_ids   = "Layering_System,Ice_Tool"
