[meta]
name = "datacenter-reactor"
desc = "데이터센터 전용 원자로 DSE (SMR/마이크로 리액터+냉각+전력 통합)"
levels = ["Reactor", "Cooling", "PowerConvert", "Safety", "Integration"]
vision = "n=6 데이터센터 원자로 — 6팩 SMR, PUE=1.2, 무탄소 AI 컴퓨팅 전원"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

