# ============================================================
# 호환성 규칙
# ============================================================

# 용융염 리액터는 동결 플러그 안전 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MSR_Small"
then_level = 3
then_ids   = "FreezePlug"

# HTGR은 TRISO 방벽 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "HTGR_Micro"
then_level = 3
then_ids   = "TRISOBarrier,PassiveDecay"

# 직류 직접 공급은 캠퍼스/병설 배치 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "DirectDC"
then_level = 4
then_ids   = "CampusMicro,ColocatedDC"

# 침지냉각은 원자로 병설 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Immersion"
then_level = 4
then_ids   = "ColocatedDC,SixPack_SMR"

# 해상 부유식은 해수 냉각 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "FloatingDC"
then_level = 1
then_ids   = "SeaWater"
