# 데이터센터 원자로 DSE 도메인 정의
# AI 데이터센터 전용 소형 원자로 — SMR/마이크로 리액터 통합
# n=6: 6팩 SMR, sigma=12 MW 모듈, PUE=1.2=sigma/(sigma-phi)
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
