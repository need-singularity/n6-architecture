type       = "require"
if_level   = 1
if_id      = "UniSleep"
then_level = 2
then_ids   = "Pod_12,CommMode_3"

# 범고래 속도는 범고래 생태형과 연결
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Orca_56"
then_level = 2
then_ids   = "Ecotype_3"

# 터미널 버즈는 빔폭 집속과 필수 연결
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Buzz_600"
then_level = 3
then_ids   = "Beam_10deg,Click_50us"
