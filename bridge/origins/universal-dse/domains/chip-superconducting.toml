# =============================================================
# N6 칩 아키텍처 6단계: Superconducting (초전도) DSE
# 칩 6단계 로드맵: HEXA-1 → PIM → 3D-적층 → Photonic → Wafer-Scale → [Superconducting]
# n=6: sigma=12 파이프라인 단계, tau=4 K 동작 온도,
#       sigma-tau=8 비트 SFQ 데이터패스, J2=24 JJ/게이트,
#       phi=2 위상 상태, n=6 플럭스 양자 루프
# BT-28 (컴퓨팅 사다리) + BT-37 (피치) + 초전도 물리
# 총 조합: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "chip-superconducting"
desc = "초전도 칩 아키텍처 DSE — 궁극의 연산 (칩 6단계 6단, 최종)"
levels = ["JunctionTech", "LogicFamily", "MemoryArch", "CryoSystem", "Application"]
vision = "n=6 정렬 초전도 — tau=4 K, 100GHz+ 클럭, 제로 동적 전력, 궁극의 연산"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

