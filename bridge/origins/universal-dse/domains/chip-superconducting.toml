# =============================================================
# 호환성 규칙
# =============================================================

# Nb/AlOx/Nb는 RSFQ/ERSFQ 논리에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Nb_AlOx"
then_level = 1
then_ids   = "RSFQ,ERSFQ,SFQ_8bit"

# YBCO 고온초전도는 GM 냉각기로 충분
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "YBCO_grain"
then_level = 3
then_ids   = "GM_cooler,Pulse_tube"

# AQFP 초저전력은 양자 컴퓨터/뉴럴넷에 최적
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "AQFP"
then_level = 4
then_ids   = "Quantum_computer,Neural_network"

# 마요라나 JJ는 양자 컴퓨터 전용
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Majorana_JJ"
then_level = 4
then_ids   = "Quantum_computer"

# 양자 컴퓨터는 희석 냉동기 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Quantum_computer"
then_level = 3
then_ids   = "Dilution_fridge"

# HPC 100GHz는 GM 냉각기 + 극저온 인터포저 최적
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "HPC_100GHz"
then_level = 3
then_ids   = "GM_cooler,Cryo_interposer"

# JJ SRAM은 RSFQ/SFQ 논리와 직접 인터페이스
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "JJ_SRAM"
then_level = 1
then_ids   = "RSFQ,SFQ_8bit"

# 하이브리드 CMOS-극저온은 HPC/뉴럴넷에 최적
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Hybrid_CMOS_cryo"
then_level = 4
then_ids   = "HPC_100GHz,Neural_network,Crypto_engine"

# 극저온 DRAM은 대용량 필요 워크로드에만
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "Cryo_DRAM"
then_level = 4
then_ids   = "HPC_100GHz,Neural_network"

# NbN은 키네틱 인덕턴스 메모리에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "NbN"
then_level = 2
then_ids   = "Kinetic_ind,Vortex_mem"
