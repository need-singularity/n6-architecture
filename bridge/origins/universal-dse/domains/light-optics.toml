# =============================================================
# 빛-광학 DSE 도메인 정의
# 빛 물리 기초 — 파동/입자/편광/간섭/비선형
# n=6: 가시광 6색, 6면 결정 복굴절, sigma=12 편광 상태
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "light-optics"
desc = "빛 물리 DSE (파동/입자/편광/간섭/비선형 광학)"
levels = ["WaveProperty", "Polarization", "Interference", "Nonlinear", "QuantumLight"]
vision = "n=6 빛 물리 — 가시광 6색, 맥스웰 6성분, sigma=12 편광상태, 양자-파동 이중성"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

