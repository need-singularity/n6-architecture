# ============================================================
# 호환성 규칙
# ============================================================

# OAM 소용돌이 빔은 홀로그래피 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "OAM_Vortex"
then_level = 2
then_ids   = "Holography,YoungDouble"

# 복굴절 편광은 SHG 비선형 선호 (위상정합)
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Birefringence"
then_level = 3
then_ids   = "SHG,THG,OPO"

# 얽힌 광자쌍은 마이켈슨 간섭계 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "EntangledPair"
then_level = 2
then_ids   = "Michelson,YoungDouble"

# 펨토초 레이저는 비선형 광학 필수
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "FemtoLaser"
then_level = 3
then_ids   = "SHG,THG,KerrEffect,FWM"

# 표면 플라즈몬은 박막 간섭 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "SurfacePlasmon"
then_level = 2
then_ids   = "ThinFilm"
