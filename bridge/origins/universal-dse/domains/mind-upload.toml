# =============================================================
# 호환성 규칙
# =============================================================

# 전자 현미경은 사후 뇌만 (생체 내 검증 불가)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Electron_Micro"
then_level = 4
then_ids   = "Gradual_Transfer,Ship_Theseus"

# 블루 브레인 수준은 GPU 클러스터 이상 필요
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Blue_Brain"
then_level = 3
then_ids   = "GPU_Cluster,Quantum_Brain"

# 점진적 전환은 생물-디지털 하이브리드 에뮬레이션 필요
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Gradual_Transfer"
then_level = 2
then_ids   = "Hybrid_Bio_Digital"

# DNA 저장은 장기 보존용 (실시간 에뮬레이션 불가)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "DNA_Storage"
then_level = 2
then_ids   = "Hodgkin_Huxley,Blue_Brain"
