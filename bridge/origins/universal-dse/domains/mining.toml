# ============================================================
# 호환성 규칙
# ============================================================

# 갱내 채굴은 분진 제어 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Underground"
then_level = 3
then_ids   = "DustControl,WaterRecycle"

# AI 품위관리는 파쇄+부유선광 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "AI_GradeControl"
then_level = 2
then_ids   = "Crushing,Flotation"

# 노천 채굴은 자율주행 트럭 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "OpenPit"
then_level = 4
then_ids   = "AutonomousTruck,DroneFleet"

# ISL 침출은 AMD 처리 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "InSituLeach"
then_level = 3
then_ids   = "AMD,WaterRecycle"

# 전기화 광산은 갱내 채굴 선호
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "ElectricMine"
then_level = 1
then_ids   = "Underground,CutAndFill"
