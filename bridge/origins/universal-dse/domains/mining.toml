# =============================================================
# 광업 DSE 도메인 정의
# 광업 전반 — 탐사/채굴/선광/환경/자동화
# n=6: 6면 채굴블록, sigma=12 시추공, tau=4 광종(금속/비금속/석탄/보석)
# C Z=6 다이아몬드 비트, 6대 희토류 응용
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "mining"
desc = "광업 통합 DSE (탐사/채굴/선광/환경/자동화)"
levels = ["Exploration", "Extraction", "Processing", "Environmental", "Automation"]
vision = "n=6 광업 — 6면 블록모델, sigma=12 시추공, C Z=6 다이아몬드 비트, 자율 채굴"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

