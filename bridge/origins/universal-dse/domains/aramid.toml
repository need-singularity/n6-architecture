# =============================================================
# 호환성 규칙
# =============================================================

# PBO는 건식 제트 습식 방사 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "PBO"
then_level = 2
then_ids   = "Dry_Jet_Wet,Gel_Spinning"

# 전기 방사는 나노 코팅과 호환
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Electrospinning"
then_level = 4
then_ids   = "Aerospace_Comp,Body_Armor"

# 메타 아라미드는 방화 응용 최적
[[rule]]
type       = "require"
if_level   = 0
if_id      = "MPD_IPC"
then_level = 4
then_ids   = "Fire_Protection,Rope_Sling"

# 멜트 블로운은 고강도 응용 제외
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Melt_Blow"
then_level = 4
then_ids   = "Body_Armor,Aerospace_Comp"
