# =============================================================
# 호환성 규칙
# =============================================================

# 나노 마찰은 고체 윤활 또는 이온성 액체 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Nano_Friction"
then_level = 2
then_ids   = "Solid_MoS2,Ionic_Liquid"

# DLC 코팅은 엔진 피스톤 또는 HDD 슬라이더와 최적
[[rule]]
type       = "require"
if_level   = 3
if_id      = "DLC_Coating"
then_level = 4
then_ids   = "Engine_Piston,HDD_Slider,MEMS_Micro"

# 수용성 윤활은 HDD 나노 응용과 비호환
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Water_Based"
then_level = 4
then_ids   = "HDD_Slider,MEMS_Micro"
