# =============================================================
# Compatibility Rules
# =============================================================

# Ashtanga requires Sun_Salutation (전통 아쉬탕가는 태양 경배 필수)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Ashtanga"
then_level = 1
then_ids   = "Sun_Salutation"

# Kundalini requires Bhastrika or Kapalabhati (에너지 호흡 필수)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Kundalini"
then_level = 2
then_ids   = "Bhastrika,Kapalabhati"

# Yin excludes Kapalabhati (음 요가에 격한 호흡 비호환)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Yin"
then_level = 2
then_ids   = "Kapalabhati,Bhastrika"

# Therapeutic prefers Iyengar or Hatha (치료 목적엔 정렬 중심)
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Therapeutic"
then_level = 0
then_ids   = "Iyengar,Hatha"
