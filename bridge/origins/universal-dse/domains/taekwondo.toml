# =============================================================
# 호환성 규칙
# =============================================================

# 뒤후려차기는 회전 콤비와 최적 호환
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Dwi_Huryeo"
then_level = 2
then_ids   = "Spin_Combo,Triple_Kick"

# 품새 훈련은 열린 가드와 비호환 (정통 자세 필수)
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Poomsae"
then_level = 1
then_ids   = "Open_Guard,Low_Guard"

# AI 스카우팅은 영상 분석 훈련 필요
[[rule]]
type       = "require"
if_level   = 4
if_id      = "AI_Scouting"
then_level = 3
then_ids   = "Video_Analysis,Sparring"

# 밀어차기 연계는 압박 겨루기와 비호환
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Pushing_Kick"
then_level = 4
then_ids   = "Pressure_Fight"
