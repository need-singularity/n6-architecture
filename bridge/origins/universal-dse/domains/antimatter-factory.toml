# =============================================================
# Compatibility Rules
# =============================================================

# 양전자 β+ 소스는 PET 의료에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Positron_Beta"
then_level = 4
then_ids   = "PET_Medical"

# 우주선 채집은 궤도 저장소와 연계
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Cosmic_Harvest"
then_level = 3
then_ids   = "Orbital_Depot"

# 충돌형 링은 분광 실험과 중력 검증에 적합
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Collider_Ring"
then_level = 4
then_ids   = "Spectroscopy,Gravity_Test"

# 반물질 추진은 궤도 저장소 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Propulsion"
then_level = 3
then_ids   = "Orbital_Depot,Magnetic_Shield"
