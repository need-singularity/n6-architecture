# =============================================================
# Compatibility Rules
# =============================================================

# Biosphere requires Remote_Sensing (지구 규모는 위성 관측 필수)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Biosphere"
then_level = 3
then_ids   = "Remote_Sensing"

# Species requires eDNA or Camera_Trap (종 수준 모니터링 필수)
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Species"
then_level = 3
then_ids   = "eDNA,Camera_Trap"

# Rewilding excludes Ex_Situ (재야생화는 역외 보전과 반대 방향)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Rewilding"
then_level = 4
then_ids   = "Ex_Situ"

# Photosynthesis pairs with Carbon_Cycle
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Photosynthesis"
then_level = 2
then_ids   = "Carbon_Cycle,Oxygen_Cycle"
