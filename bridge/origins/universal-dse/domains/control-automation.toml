# ============================================================
# 호환성 규칙
# ============================================================

# AI 강화학습 컨트롤러는 센서 퓨전 또는 비전 필요
[[rule]]
type = "require"
if_level = 1
if_id = "AI-RL"
then_level = 0
then_ids = ["Fusion-12ch", "Vision-4cam"]

# 유압 액추에이터는 프로세스 DCS 또는 건설 전용
[[rule]]
type = "exclude"
if_level = 2
if_id = "Hydraulic-12MPa"
then_level = 4
then_ids = ["Cobot-Line"]

# 5G URLLC는 스마트팩토리/자율셀 전용 (무선 필요 환경)
[[rule]]
type = "exclude"
if_level = 3
if_id = "5G-URLLC"
then_level = 4
then_ids = ["Process-DCS"]

# 압전 액추에이터는 나노정밀 전용
[[rule]]
type = "exclude"
if_level = 2
if_id = "Piezo-6stack"
then_level = 4
then_ids = ["SmartFactory", "AutonomousCell"]

# 자율 제조셀은 AI 컨트롤러 필요
[[rule]]
type = "require"
if_level = 4
if_id = "AutonomousCell"
then_level = 1
then_ids = ["AI-RL", "Adaptive-N6", "MPC-12step"]
