# =============================================================
# 호환성 규칙
# =============================================================

# 포도당 기질은 에탄올 또는 유산 산물 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Glucose_Simple"
then_level = 3
then_ids   = "Ethanol,Lactic_Acid,CO2_Gas"

# 고체 발효는 한국 장류와 호환 최적
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Solid_State"
then_level = 4
then_ids   = "Korean_Jang,Kimchi"

# 절대 혐기는 호기성 초산과 비호환
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Anaerobic_Strict"
then_level = 3
then_ids   = "Acetic_Acid"
