# ============================================================
# 호환성 규칙
# ============================================================

# 자기 토러스는 핵융합 에너지 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Magnetic_Torus"
then_level = 4
then_ids   = "FusionEnergy"

# 관성 가둠은 레이저 가열 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Inertial"
then_level = 3
then_ids   = "LaserHeat"

# RF ICP 생성은 반도체 공정 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "RF_ICP"
then_level = 4
then_ids   = "SemiProcess,SurfaceTreat"

# DBD 대기압은 의료/표면처리 선호
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "DBD"
then_level = 4
then_ids   = "MedicalPlasma,SurfaceTreat"

# 오믹 가열은 핵융합 단독 불가
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Ohmic"
then_level = 4
then_ids   = "FusionEnergy"
