# =============================================================
# 플라즈마 물리학 DSE 도메인 정의
# 플라즈마 기초 + 응용 — 생성/가둠/진단/가열/응용
# n=6: tau=4 번째 물질상태, sigma=12 TF코일, 6각 결정 대칭
# 핵융합/반도체/우주/의료 전반 연결
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "plasma"
desc = "플라즈마 물리학 DSE (생성/가둠/진단/가열/응용)"
levels = ["Generation", "Confinement", "Diagnostics", "Heating", "Application"]
vision = "n=6 플라즈마 — tau=4 물질상태, 6각 결정 대칭, sigma=12 코일, 우주 99% 물질"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

