# =============================================================
# 호환성 규칙
# =============================================================

# 전체 300mm 웨이퍼는 메시 12x12 NoC에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Full_300mm"
then_level = 1
then_ids   = "Mesh_12x12,Torus_12x12"

# 1/4 웨이퍼는 엣지 배포에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Quarter_wafer"
then_level = 4
then_ids   = "Edge_single,Inference_rack"

# 광 NoC는 대규모 웨이퍼에만 의미
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Optical_NoC"
then_level = 0
then_ids   = "Full_300mm,Wafer_450mm"

# 멀티 레티클은 KGD 선별 필수
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Multi_reticle"
then_level = 2
then_ids   = "Chiplet_KGD,Spare_tile_tau4"

# AI 훈련 팟은 분산 SRAM 또는 통합 40TB 필요
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "AI_training_pod"
then_level = 3
then_ids   = "Distributed_SRAM,Unified_40TB"

# 극저온 웨이퍼는 광 NoC에 최적 (전기 NoC 불필요)
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Cryo_wafer"
then_level = 1
then_ids   = "Optical_NoC,Torus_12x12"

# 광 웨이퍼 DC는 광 메모리에 최적
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Photonic_wafer_DC"
then_level = 3
then_ids   = "Optical_mem,Distributed_SRAM"

# 칩렛 웨이퍼는 동적 재라우팅 결함 내성 필요
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Chiplet_wafer"
then_level = 2
then_ids   = "Chiplet_KGD,Reroute_mesh"

# 토러스 NoC는 분산 SRAM에 최적 (균일 접근)
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "Torus_12x12"
then_level = 3
then_ids   = "Distributed_SRAM,Unified_40TB"

# 450mm 웨이퍼는 AI 훈련에만 경제적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "Wafer_450mm"
then_level = 4
then_ids   = "AI_training_pod,Scientific_cluster"
