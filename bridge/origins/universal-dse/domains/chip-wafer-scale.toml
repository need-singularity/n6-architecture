# =============================================================
# N6 칩 아키텍처 5단계: Wafer-Scale (웨이퍼 스케일) DSE
# 칩 6단계 로드맵: HEXA-1 → PIM → 3D-적층 → Photonic → [Wafer-Scale] → Superconducting
# n=6: sigma^2=144 타일, sigma=12 열 존, tau=4 리던던시,
#       J2=24 NoC 링크, sigma*J2=288 mm 웨이퍼 직경(~300mm),
#       n=6 전력 도메인
# BT-28 (컴퓨팅 사다리) + BT-69 (칩렛) + BT-90 (SM=phi*K6)
# 총 조합: 6x6x6x6x6 = 7,776
# =============================================================

[meta]
name = "chip-wafer-scale"
desc = "웨이퍼 스케일 칩 아키텍처 DSE — 전체 웨이퍼 단일 칩 (칩 6단계 5단)"
levels = ["WaferTech", "NoCTopology", "FaultTolerance", "MemorySystem", "Deployment"]
vision = "n=6 정렬 웨이퍼 스케일 — sigma^2=144 타일, 40TB+ SRAM, 궁극의 단일 칩"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

