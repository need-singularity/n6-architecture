# 칩 6단계 로드맵: HEXA-1 → [PIM] → 3D-적층 → Photonic → Wafer-Scale → Superconducting
# n=6: sigma-tau=8 비트 MAC, sigma=12 뱅크 그룹, tau=4 서브어레이,
#       phi=2 오퍼랜드, J2=24 비트라인, n=6 파이프라인 스테이지
