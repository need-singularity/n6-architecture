# 호환성 규칙
# =============================================================

# SRAM-6T는 LUT 및 뱅크당 ALU 연산에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "SRAM_6T"
then_level = 1
then_ids   = "LUT_6input,ALU_per_bank"

# ReRAM 크로스바는 아날로그 MAC 전용 설계
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "ReRAM_crossbar"
then_level = 1
then_ids   = "MAC_8bit,Reduce_tau4"

# DRAM 12뱅크는 행/열 병렬 데이터 이동에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "DRAM_12bank"
then_level = 2
then_ids   = "Row_activate,BankGroup_12"

# HBM-PIM은 GEMM/LLM 어텐션 워크로드에 최적
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "HBM_PIM_12ch"
then_level = 4
then_ids   = "GEMM_int8,LLM_attention"

# LPDDR-PIM은 엣지/모바일 워크로드 전용
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "LPDDR_PIM"
then_level = 4
then_ids   = "Recommendation,Graph_n6"

# PCM은 아날로그 MAC 가중치 저장에 최적
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "PCM_4level"
then_level = 1
then_ids   = "MAC_8bit,Bitwise_bulk"

# 광 인터커넥트 PIM은 뱅크그룹 병렬에 최적
[[rule]]
type       = "prefer"
if_level   = 3
if_id      = "Optical_PIM"
then_level = 2
then_ids   = "BankGroup_12,Pipeline_6"

# LLM 어텐션은 브로드캐스트 데이터플로우에 최적
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "LLM_attention"
then_level = 2
then_ids   = "Broadcast_24,BankGroup_12"

# 그래프 순회는 세밀 활성화 필요
[[rule]]
type       = "prefer"
if_level   = 4
if_id      = "Graph_n6"
then_level = 2
then_ids   = "Subarray_4,Pipeline_6"

# HBM-PIM 메모리는 HBM-PIM 통합에만 적합
[[rule]]
type       = "prefer"
if_level   = 0
if_id      = "HBM_PIM"
then_level = 3
then_ids   = "HBM_PIM_12ch,Optical_PIM"
