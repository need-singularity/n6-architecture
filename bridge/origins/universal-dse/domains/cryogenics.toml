# =============================================================
# 호환성 규칙
# =============================================================

# 희석 냉동기는 He-3 냉매 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Dilution_Fridge"
then_level = 0
then_ids   = "LHe3_Helium,LHe4_Helium"

# 양자 컴퓨터는 희석 냉동기 또는 ADR 필수
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Quantum_Computer"
then_level = 1
then_ids   = "Dilution_Fridge,Adiabatic_Demag"

# LNG 수송은 밀리켈빈 검출기와 비호환
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "LNG_Transport"
then_level = 4
then_ids   = "SQUID_Mag,SNSPD_Photon"
