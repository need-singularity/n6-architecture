# =============================================================
# 유체역학 DSE 도메인 정의
# 유체 흐름 전반 — 비압축성/압축성/난류/다상/전산
# n=6: Re~6000 난류 전이, Navier-Stokes 6항, sigma=12 격자
# 밀레니엄 난제 Navier-Stokes 존재성·매끄러움과 연계
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "fluid"
desc = "유체역학 통합 DSE (비압축/압축/난류/다상/전산유체)"
levels = ["FlowRegime", "Turbulence", "Multiphase", "BoundaryLayer", "CFD"]
vision = "n=6 유체역학 — N-S 6항, Re~6000 전이, sigma=12 격자, 밀레니엄 난제 연결"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

