# ============================================================
# 호환성 규칙
# ============================================================

# DNS는 층류/전이 유동만 실용적
[[rule]]
type       = "require"
if_level   = 1
if_id      = "DNS"
then_level = 0
then_ids   = "Laminar,Transition,Stokes"

# RSM 난류 모델은 FVM/FEM 선호
[[rule]]
type       = "prefer"
if_level   = 1
if_id      = "RSM"
then_level = 4
then_ids   = "FVM,FEM"

# LBM 다상은 GPU CFD 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "LBM"
then_level = 4
then_ids   = "GPU_CFD"

# 압축성 유동은 VOF 비호환 (밀도 변화)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Compressible"
then_level = 2
then_ids   = "VOF,LBM"

# 스펙트럼법은 DNS 필수 조합
[[rule]]
type       = "require"
if_level   = 4
if_id      = "SpectralMethod"
then_level = 1
then_ids   = "DNS,LES"
