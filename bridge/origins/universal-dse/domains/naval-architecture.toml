# =============================================================
# 조선공학 DSE 도메인 정의
# 선박 설계 전반 — 선형/구조/추진/안정성/시스템
# n=6: 6자유도 운동, sigma=12 수밀격벽, tau=4 분류(상선/군함/특수/여객)
# 총 조합: 6x6x6x6x6 = 7,776 (필터 전)
# =============================================================

[meta]
name = "naval-architecture"
desc = "조선공학 DSE (선형/구조/추진/안정성/시스템)"
levels = ["HullForm", "Structure", "Propulsion", "Stability", "ShipSystem"]
vision = "n=6 조선 — 6자유도 내항성, sigma=12 격벽, tau=4 선종, 해양 구조물 통합"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

