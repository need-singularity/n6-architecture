# ============================================================
# 호환성 규칙
# ============================================================

# 잠수함은 티타늄/고장력강 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Submarine"
then_level = 1
then_ids   = "HighTensile,TitaniumSub"

# 쌍동선은 핀 안정장치 불필요
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Catamaran"
then_level = 3
then_ids   = "FinStabilizer"

# 해양 원자력은 손상복원성 필수
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Nuclear_Marine"
then_level = 3
then_ids   = "DamageStab,IntactStab"

# LNG 이중연료는 자율운항 선호
[[rule]]
type       = "prefer"
if_level   = 2
if_id      = "LNG_DualFuel"
then_level = 4
then_ids   = "AutonomousNav,Navigation"

# 반잠수식은 DP 시스템 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "SemiSub"
then_level = 3
then_ids   = "DPS"
