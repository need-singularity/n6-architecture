# ============================================================
# 호환성 규칙
# ============================================================

# TRISO 연료는 고온가스로 노심 필요
[[rule]]
type = "require"
if_level = 0
if_id = "TRISO-HALEU"
then_level = 1
then_ids = ["HTGR-Pebble", "HTGR-Prismatic"]

# 용융염 연료는 용융염로 전용
[[rule]]
type = "require"
if_level = 0
if_id = "Molten-Salt"
then_level = 1
then_ids = ["MSR"]

# 소듐 냉각은 소듐 고속로 전용
[[rule]]
type = "require"
if_level = 2
if_id = "Na-Liquid"
then_level = 1
then_ids = ["SFR-Pool"]

# 헬륨 냉각은 고온가스로 전용
[[rule]]
type = "require"
if_level = 2
if_id = "He-Gas"
then_level = 1
then_ids = ["HTGR-Pebble", "HTGR-Prismatic"]

# 열전변환은 원격 엣지 전용 (보조 발전)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Thermoelectric"
then_level = 4
then_ids = ["DC-Direct", "Campus-Grid"]

# 수소 전기분해는 데이터센터 직결과 비호환
[[rule]]
type = "exclude"
if_level = 3
if_id = "H2-Electrolysis"
then_level = 4
then_ids = ["DC-Direct"]
