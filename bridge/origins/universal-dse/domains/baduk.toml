# =============================================================
# 호환성 규칙
# =============================================================

# AI 신포석은 AI 엔진 분석 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "AI_Novel"
then_level = 3
then_ids   = "KataGo,AlphaZero,AlphaGo_MCTS"

# 인간-AI 하이브리드는 AI 분석 훈련 필요
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Hybrid_Human"
then_level = 4
then_ids   = "AI_Analysis,Pro_Review"

# 삼삼 포석은 AI 끝내기와 호환 최적
[[rule]]
type       = "require"
if_level   = 0
if_id      = "San_San"
then_level = 2
then_ids   = "AI_Endgame,Sente_Yose"

# 속기는 사바키 중반전과 호환
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Speed_Game"
then_level = 1
then_ids   = "Sabaki,Attack_Weak,Ko_Fight"
