# ============================================================
# 호환성 규칙
# ============================================================

# 타이어코드 840d는 5배 이상 연신 필요
[[rule]]
type = "require"
if_level = 4
if_id = "TireCord-840d"
then_level = 3
then_ids = ["Draw-5x", "Draw-6x"]

# 에어백 420d는 축중합 나일론66 필요
[[rule]]
type = "require"
if_level = 4
if_id = "Airbag-420d"
then_level = 1
then_ids = ["Condensation", "SSP"]

# 엔지니어링 레진은 방사 공정 불필요 (펠렛 형태)
[[rule]]
type = "exclude"
if_level = 4
if_id = "Engineering-Resin"
then_level = 2
then_ids = ["Melt-Spin-144f", "High-Speed", "BCF"]

# 라우로락탐(나일론12)은 축중합/음이온만 호환
[[rule]]
type = "require"
if_level = 0
if_id = "Laurolactam-C12"
then_level = 1
then_ids = ["Condensation", "Anionic"]

# 극세사(144f)는 의류 전용
[[rule]]
type = "exclude"
if_level = 2
if_id = "Melt-Spin-144f"
then_level = 4
then_ids = ["TireCord-840d", "Industrial-1260d"]
