<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SEDI Discovery Graph</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #0a0e17; color: #c8ccd4; font-family: 'SF Mono', 'Fira Code', monospace; display: flex; height: 100vh; overflow: hidden; }
#sidebar { width: 320px; background: #12171f; border-right: 1px solid #1e2633; padding: 16px; overflow-y: auto; flex-shrink: 0; }
#graph-container { flex: 1; position: relative; }
svg { width: 100%; height: 100%; }
h1 { font-size: 16px; color: #61afef; margin-bottom: 4px; }
.subtitle { font-size: 11px; color: #5c6370; margin-bottom: 16px; }
.section { margin-bottom: 16px; }
.section-title { font-size: 12px; color: #e5c07b; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; border-bottom: 1px solid #1e2633; padding-bottom: 4px; }
.stat-row { display: flex; justify-content: space-between; font-size: 12px; padding: 2px 0; }
.stat-label { color: #5c6370; }
.stat-value { color: #abb2bf; font-weight: bold; }
.tier-bar { display: flex; height: 20px; border-radius: 3px; overflow: hidden; margin-bottom: 4px; }
.tier-bar div { display: flex; align-items: center; justify-content: center; font-size: 10px; font-weight: bold; color: #0a0e17; }
.tier-a { background: #98c379; }
.tier-b { background: #e5c07b; }
.tier-c { background: #e06c75; }
.tier-d { background: #5c6370; }
.tier-legend { display: flex; gap: 12px; font-size: 10px; margin-top: 4px; }
.tier-legend span::before { content: ''; display: inline-block; width: 8px; height: 8px; border-radius: 2px; margin-right: 4px; vertical-align: middle; }
.tier-legend .la::before { background: #98c379; }
.tier-legend .lb::before { background: #e5c07b; }
.tier-legend .lc::before { background: #e06c75; }
.tier-legend .ld::before { background: #5c6370; }
.hub-list { font-size: 11px; }
.hub-item { display: flex; justify-content: space-between; padding: 2px 0; border-bottom: 1px solid #1a1f2b; }
.hub-name { color: #61afef; }
.hub-deg { color: #5c6370; }
input[type="text"] { width: 100%; background: #1a1f2b; border: 1px solid #2c313a; color: #abb2bf; padding: 6px 8px; border-radius: 4px; font-size: 12px; font-family: inherit; outline: none; }
input[type="text"]:focus { border-color: #61afef; }
.filter-group { display: flex; gap: 4px; flex-wrap: wrap; margin-top: 6px; }
.filter-btn { background: #1a1f2b; border: 1px solid #2c313a; color: #abb2bf; padding: 3px 8px; border-radius: 3px; font-size: 10px; cursor: pointer; font-family: inherit; }
.filter-btn.active { background: #61afef; color: #0a0e17; border-color: #61afef; }
.filter-btn:hover { border-color: #61afef; }
#detail-panel { margin-top: 12px; background: #1a1f2b; border-radius: 4px; padding: 10px; font-size: 11px; display: none; }
#detail-panel .detail-id { color: #61afef; font-size: 14px; font-weight: bold; margin-bottom: 6px; }
#detail-panel .detail-row { padding: 2px 0; }
#detail-panel .detail-label { color: #5c6370; }
.node-hyp { fill: #4a90d9; }
.node-const { fill: #e06c75; }
.node-domain { fill: #98c379; }
.edge-uses { stroke: #3a4050; stroke-width: 0.5; }
.edge-spans { stroke: #3a4050; stroke-width: 0.5; stroke-dasharray: 4 2; }
.edge-cooccurs { stroke: #2a3040; stroke-width: 0.3; stroke-dasharray: 1 2; }
.node-label { font-size: 9px; fill: #abb2bf; pointer-events: none; text-anchor: middle; }
.loading { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); color: #5c6370; font-size: 14px; }
#health-score { font-size: 28px; font-weight: bold; text-align: center; padding: 8px 0; }
</style>
</head>
<body>
<div id="sidebar">
  <h1>SEDI Discovery Graph</h1>
  <div class="subtitle">Search for Extra-Dimensional Intelligence</div>

  <div class="section">
    <div class="section-title">Search</div>
    <input type="text" id="search" placeholder="Find hypothesis by ID...">
  </div>

  <div class="section">
    <div class="section-title">Filter by Tier</div>
    <div class="filter-group" id="tier-filters">
      <button class="filter-btn active" data-tier="all">All</button>
      <button class="filter-btn" data-tier="A">A</button>
      <button class="filter-btn" data-tier="B">B</button>
      <button class="filter-btn" data-tier="C">C</button>
      <button class="filter-btn" data-tier="D">D</button>
    </div>
  </div>

  <div class="section">
    <div class="section-title">Filter by Domain</div>
    <div class="filter-group" id="domain-filters"></div>
  </div>

  <div class="section">
    <div class="section-title">Graph Stats</div>
    <div id="stats-panel"></div>
  </div>

  <div class="section">
    <div class="section-title">Health Score</div>
    <div id="health-score">--</div>
  </div>

  <div class="section">
    <div class="section-title">Tier Distribution</div>
    <div id="tier-chart"></div>
  </div>

  <div class="section">
    <div class="section-title">Top-10 Hub Nodes</div>
    <div id="hub-list" class="hub-list"></div>
  </div>

  <div id="detail-panel"></div>
</div>

<div id="graph-container">
  <div class="loading" id="loading">Loading graph data...</div>
  <svg id="graph-svg"></svg>
</div>

<script>
(function() {
  const DATA_PATH = '../../data/sedi-graph.json';
  let graphData = null;
  let simulation = null;
  let currentTier = 'all';
  let currentDomain = 'all';
  let highlightId = null;

  function classifyTier(grade) {
    if (!grade) return 'D';
    if (grade.includes('CONFIRMED') || grade.includes('\u{1f7e9}')) return 'A';
    if (grade.includes('\u{1f7e7}')) return 'B';
    if (grade.includes('\u{1f7e5}')) return 'C';
    return 'D';
  }

  function starCount(grade) {
    if (!grade) return 0;
    return (grade.match(/\u2605/g) || []).length;
  }

  function nodeRadius(node) {
    if (node.kind === 'DOMAIN') return 14;
    if (node.kind === 'CONSTANT') return 10;
    const stars = starCount(node.grade);
    return 4 + stars * 1.5;
  }

  function nodeShape(node) { return node.kind; }

  function tierColor(tier) {
    return { A: '#98c379', B: '#e5c07b', C: '#e06c75', D: '#5c6370' }[tier] || '#5c6370';
  }

  function nodeColor(node) {
    if (node.kind === 'CONSTANT') return '#e06c75';
    if (node.kind === 'DOMAIN') return '#98c379';
    return tierColor(classifyTier(node.grade));
  }

  function edgeStyle(kind) {
    if (kind === 'USES') return '';
    if (kind === 'SPANS') return '4 2';
    return '1 2';
  }

  function computeHealth(stats) {
    const connectivity = Math.min(stats.degree_avg / 25, 1);
    const clustering = Math.min(stats.clustering_coefficient / 0.5, 1);
    const coverage = Math.min(stats.hypothesis_count / 700, 1);
    const compPenalty = stats.connected_components <= 2 ? 1 : Math.max(0, 1 - (stats.connected_components - 2) * 0.1);
    return Math.round((connectivity * 0.3 + clustering * 0.3 + coverage * 0.25 + compPenalty * 0.15) * 100);
  }

  function renderStats(stats) {
    const panel = document.getElementById('stats-panel');
    const rows = [
      ['Total Nodes', stats.total_nodes],
      ['Total Edges', stats.total_edges],
      ['Hypotheses', stats.hypothesis_count],
      ['Constants', stats.constant_count],
      ['Domains', stats.domain_count],
      ['Degree (avg)', stats.degree_avg.toFixed(1)],
      ['Degree (max)', stats.degree_max],
      ['Clustering', stats.clustering_coefficient.toFixed(4)],
      ['Components', stats.connected_components],
    ];
    panel.innerHTML = rows.map(([l,v]) =>
      `<div class="stat-row"><span class="stat-label">${l}</span><span class="stat-value">${v}</span></div>`
    ).join('');
  }

  function renderTierChart(nodes) {
    const tiers = { A: 0, B: 0, C: 0, D: 0 };
    nodes.filter(n => n.kind === 'HYPOTHESIS').forEach(n => tiers[classifyTier(n.grade)]++);
    const total = Object.values(tiers).reduce((a,b) => a+b, 0);
    const chart = document.getElementById('tier-chart');
    chart.innerHTML = `
      <div class="tier-bar">
        ${Object.entries(tiers).map(([t,c]) => {
          const pct = total > 0 ? (c/total*100) : 0;
          if (pct < 2) return '';
          return `<div class="tier-${t.toLowerCase()}" style="width:${pct}%">${c}</div>`;
        }).join('')}
      </div>
      <div class="tier-legend">
        <span class="la">A: Confirmed (${tiers.A})</span>
        <span class="lb">B: Strong (${tiers.B})</span>
        <span class="lc">C: Weak (${tiers.C})</span>
        <span class="ld">D: Unknown (${tiers.D})</span>
      </div>`;
  }

  function renderHubs(hubs) {
    const list = document.getElementById('hub-list');
    list.innerHTML = hubs.map(([name, deg], i) =>
      `<div class="hub-item"><span class="hub-name">${i+1}. ${name}</span><span class="hub-deg">deg ${deg}</span></div>`
    ).join('');
  }

  function renderDomainFilters(nodes) {
    const domains = nodes.filter(n => n.kind === 'DOMAIN').map(n => n.id).sort();
    const container = document.getElementById('domain-filters');
    container.innerHTML = `<button class="filter-btn active" data-domain="all">All</button>` +
      domains.map(d => `<button class="filter-btn" data-domain="${d}">${d}</button>`).join('');
    container.querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        container.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentDomain = btn.dataset.domain;
        updateVisibility();
      });
    });
  }

  function showDetail(node, edges) {
    const panel = document.getElementById('detail-panel');
    const connections = edges.filter(e => e.source.id === node.id || e.target.id === node.id);
    const uses = connections.filter(e => e.kind === 'USES');
    const spans = connections.filter(e => e.kind === 'SPANS');
    panel.style.display = 'block';
    panel.innerHTML = `
      <div class="detail-id">${node.id}</div>
      <div class="detail-row"><span class="detail-label">Kind: </span>${node.kind}</div>
      ${node.grade ? `<div class="detail-row"><span class="detail-label">Grade: </span>${node.grade}</div>` : ''}
      ${node.category ? `<div class="detail-row"><span class="detail-label">Category: </span>${node.category}</div>` : ''}
      ${node.error_pct != null ? `<div class="detail-row"><span class="detail-label">Error: </span>${node.error_pct}%</div>` : ''}
      <div class="detail-row"><span class="detail-label">Connections: </span>${connections.length}</div>
      ${uses.length ? `<div class="detail-row"><span class="detail-label">Uses: </span>${uses.map(e => e.source.id === node.id ? e.target.id : e.source.id).join(', ')}</div>` : ''}
      ${spans.length ? `<div class="detail-row"><span class="detail-label">Spans: </span>${spans.map(e => e.source.id === node.id ? e.target.id : e.source.id).join(', ')}</div>` : ''}
    `;
  }

  function shouldShow(node) {
    if (currentTier !== 'all' && node.kind === 'HYPOTHESIS' && classifyTier(node.grade) !== currentTier) return false;
    if (currentDomain !== 'all' && node.kind === 'HYPOTHESIS') {
      const linked = graphData.edges.some(e =>
        ((e.source.id || e.source) === node.id && (e.target.id || e.target) === currentDomain) ||
        ((e.target.id || e.target) === node.id && (e.source.id || e.source) === currentDomain)
      );
      if (!linked) return false;
    }
    return true;
  }

  function updateVisibility() {
    d3.selectAll('.node-group').attr('opacity', d => shouldShow(d) ? 1 : 0.05);
    d3.selectAll('.graph-edge').attr('opacity', d => {
      const s = typeof d.source === 'object' ? d.source : graphData.nodes.find(n => n.id === d.source);
      const t = typeof d.target === 'object' ? d.target : graphData.nodes.find(n => n.id === d.target);
      return (s && shouldShow(s) && t && shouldShow(t)) ? 0.3 : 0.02;
    });
  }

  function sampleGraph(data) {
    // For large graphs, sample to keep interactive performance.
    // Keep all constants + domains, sample hypotheses.
    const MAX_NODES = 200;
    const nonHyp = data.nodes.filter(n => n.kind !== 'HYPOTHESIS');
    const hyp = data.nodes.filter(n => n.kind === 'HYPOTHESIS');

    let selectedHyp;
    if (hyp.length <= MAX_NODES - nonHyp.length) {
      selectedHyp = hyp;
    } else {
      // Prioritize: high-star nodes, then sample
      hyp.sort((a,b) => starCount(b.grade) - starCount(a.grade));
      selectedHyp = hyp.slice(0, MAX_NODES - nonHyp.length);
    }

    const selectedIds = new Set([...nonHyp, ...selectedHyp].map(n => n.id));
    const selectedEdges = data.edges.filter(e => selectedIds.has(e.source) && selectedIds.has(e.target));

    return {
      nodes: [...nonHyp, ...selectedHyp],
      edges: selectedEdges,
      stats: data.stats,
      suggestions: data.suggestions,
    };
  }

  function initGraph(raw) {
    const sampled = sampleGraph(raw);
    graphData = sampled;

    document.getElementById('loading').style.display = 'none';

    renderStats(raw.stats);
    renderTierChart(raw.nodes);
    renderHubs(raw.stats.hub_nodes);
    renderDomainFilters(raw.nodes);

    const health = computeHealth(raw.stats);
    const hColor = health >= 70 ? '#98c379' : health >= 40 ? '#e5c07b' : '#e06c75';
    document.getElementById('health-score').innerHTML = `<span style="color:${hColor}">${health}/100</span>`;

    // Tier filter buttons
    document.getElementById('tier-filters').querySelectorAll('.filter-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        document.getElementById('tier-filters').querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
        btn.classList.add('active');
        currentTier = btn.dataset.tier;
        updateVisibility();
      });
    });

    // Search
    document.getElementById('search').addEventListener('input', function() {
      const q = this.value.toUpperCase();
      if (!q) {
        highlightId = null;
        d3.selectAll('.node-group').select('circle,rect,polygon').attr('stroke', 'none');
        return;
      }
      const match = sampled.nodes.find(n => n.id.toUpperCase().includes(q));
      if (match) {
        highlightId = match.id;
        d3.selectAll('.node-group').select('circle,rect,polygon')
          .attr('stroke', d => d.id === match.id ? '#ffffff' : 'none')
          .attr('stroke-width', d => d.id === match.id ? 2 : 0);
        // Center on node
        const svg = d3.select('#graph-svg');
        const width = svg.node().clientWidth;
        const height = svg.node().clientHeight;
        const transform = d3.zoomTransform(svg.node());
        const newTransform = d3.zoomIdentity
          .translate(width/2, height/2)
          .scale(transform.k)
          .translate(-match.x, -match.y);
        svg.transition().duration(500).call(zoom.transform, newTransform);
      }
    });

    // D3 Force Simulation
    const svg = d3.select('#graph-svg');
    const container = document.getElementById('graph-container');
    const width = container.clientWidth;
    const height = container.clientHeight;

    const g = svg.append('g');

    const zoom = d3.zoom()
      .scaleExtent([0.1, 8])
      .on('zoom', (event) => g.attr('transform', event.transform));
    svg.call(zoom);

    // Make zoom accessible for search
    window.zoom = zoom;

    // Edges
    const edgeG = g.append('g');
    const links = edgeG.selectAll('line')
      .data(sampled.edges)
      .join('line')
      .attr('class', d => `graph-edge edge-${d.kind.toLowerCase()}`)
      .attr('stroke', '#2a3040')
      .attr('stroke-width', d => d.kind === 'CO_OCCURS' ? 0.3 : 0.5)
      .attr('stroke-dasharray', d => edgeStyle(d.kind))
      .attr('opacity', 0.3);

    // Nodes
    const nodeG = g.append('g');
    const nodeGroups = nodeG.selectAll('g')
      .data(sampled.nodes)
      .join('g')
      .attr('class', 'node-group')
      .style('cursor', 'pointer')
      .call(d3.drag()
        .on('start', (event, d) => {
          if (!event.active) simulation.alphaTarget(0.3).restart();
          d.fx = d.x; d.fy = d.y;
        })
        .on('drag', (event, d) => { d.fx = event.x; d.fy = event.y; })
        .on('end', (event, d) => {
          if (!event.active) simulation.alphaTarget(0);
          d.fx = null; d.fy = null;
        })
      )
      .on('click', (event, d) => showDetail(d, sampled.edges));

    // Draw shapes based on kind
    nodeGroups.each(function(d) {
      const el = d3.select(this);
      const r = nodeRadius(d);
      if (d.kind === 'CONSTANT') {
        // Diamond (rotated square)
        const s = r;
        el.append('polygon')
          .attr('points', `0,${-s} ${s},0 0,${s} ${-s},0`)
          .attr('fill', nodeColor(d));
      } else if (d.kind === 'DOMAIN') {
        // Square
        const s = r;
        el.append('rect')
          .attr('x', -s).attr('y', -s)
          .attr('width', s*2).attr('height', s*2)
          .attr('rx', 2)
          .attr('fill', nodeColor(d));
      } else {
        // Circle for hypothesis
        el.append('circle')
          .attr('r', r)
          .attr('fill', nodeColor(d));
      }
    });

    // Labels for non-hypothesis nodes (constants + domains)
    nodeGroups.filter(d => d.kind !== 'HYPOTHESIS')
      .append('text')
      .attr('class', 'node-label')
      .attr('dy', d => d.kind === 'DOMAIN' ? nodeRadius(d) + 12 : nodeRadius(d) + 10)
      .text(d => d.id);

    // Simulation
    simulation = d3.forceSimulation(sampled.nodes)
      .force('link', d3.forceLink(sampled.edges).id(d => d.id).distance(40).strength(0.1))
      .force('charge', d3.forceManyBody().strength(d => d.kind === 'HYPOTHESIS' ? -15 : -80))
      .force('center', d3.forceCenter(width/2, height/2))
      .force('collision', d3.forceCollide().radius(d => nodeRadius(d) + 2))
      .on('tick', () => {
        links
          .attr('x1', d => d.source.x).attr('y1', d => d.source.y)
          .attr('x2', d => d.target.x).attr('y2', d => d.target.y);
        nodeGroups.attr('transform', d => `translate(${d.x},${d.y})`);
      });

    // Initial zoom to fit
    setTimeout(() => {
      const bounds = g.node().getBBox();
      if (bounds.width > 0 && bounds.height > 0) {
        const scale = Math.min(width / (bounds.width + 40), height / (bounds.height + 40)) * 0.9;
        const tx = width/2 - (bounds.x + bounds.width/2) * scale;
        const ty = height/2 - (bounds.y + bounds.height/2) * scale;
        svg.transition().duration(750).call(zoom.transform, d3.zoomIdentity.translate(tx, ty).scale(scale));
      }
    }, 2000);
  }

  // Load data
  fetch(DATA_PATH)
    .then(r => {
      if (!r.ok) throw new Error('Failed to load graph JSON');
      return r.json();
    })
    .then(data => initGraph(data))
    .catch(err => {
      console.warn('Could not load graph JSON, using embedded sample:', err);
      // Embedded sample fallback
      const sample = buildSampleGraph();
      initGraph(sample);
    });

  function buildSampleGraph() {
    const domains = ['particle','cosmology','seti','nuclear','qcd','electroweak','neutrino','exoplanet','consciousness','biology','mathematics'];
    const constants = ['sigma','tau','phi','n','sopfr','J2','mu','sigma-tau','sigma/tau','sigma*phi','sigma*tau','sigma*n','phi^sigma','sigma^2','tau^2'];
    const nodes = [];
    const edges = [];
    domains.forEach(d => nodes.push({id:d, kind:'DOMAIN'}));
    constants.forEach(c => nodes.push({id:c, kind:'CONSTANT'}));
    const cats = ['CX','CA','AF','CS','CERN'];
    const grades = ['\u{1f7e9} CONFIRMED','\u{1f7e7}\u2605\u2605\u2605','\u{1f7e7}\u2605\u2605','\u{1f7e7}\u2605','\u{1f7e7}','\u{1f7e5}\u2605\u2605','\u{1f7e5}\u2605','\u{1f7e5}'];
    for (let i = 1; i <= 50; i++) {
      const cat = cats[i % cats.length];
      const id = `H-${cat}-${String(i).padStart(3,'0')}`;
      const grade = grades[i % grades.length];
      nodes.push({id, kind:'HYPOTHESIS', grade, category:cat, error_pct: Math.random()*10});
      // Connect to 1-3 constants
      const nc = 1 + Math.floor(Math.random()*3);
      for (let j = 0; j < nc; j++) {
        const c = constants[Math.floor(Math.random()*constants.length)];
        edges.push({source:id, target:c, kind:'USES'});
      }
      // Connect to 1-2 domains
      const nd = 1 + Math.floor(Math.random()*2);
      for (let j = 0; j < nd; j++) {
        const d = domains[Math.floor(Math.random()*domains.length)];
        edges.push({source:id, target:d, kind:'SPANS'});
      }
    }
    // Some co-occurs
    for (let i = 0; i < 5; i++) {
      const a = constants[Math.floor(Math.random()*constants.length)];
      const b = constants[Math.floor(Math.random()*constants.length)];
      if (a !== b) edges.push({source:a, target:b, kind:'CO_OCCURS'});
    }
    return {
      nodes, edges,
      stats: {total_nodes:nodes.length,total_edges:edges.length,hypothesis_count:50,constant_count:15,domain_count:11,degree_min:1,degree_max:30,degree_avg:5.2,degree_median:4,clustering_coefficient:0.15,connected_components:1,hub_nodes:[['sigma',25],['particle',22],['n',20],['tau',18],['phi',16],['cosmology',14],['sopfr',12],['mathematics',10],['sigma-tau',8],['qcd',6]],isolated_nodes:[]},
      suggestions:{bridge_targets:[],high_cooccurrence:[],low_connectivity:[]}
    };
  }
})();
</script>
</body>
</html>
