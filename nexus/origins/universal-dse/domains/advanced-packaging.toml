# ============================================================
# 호환성 규칙
# ============================================================

# 하이브리드 본딩은 Cu-Cu 또는 SiO2 직접 소재 필요
[[rule]]
type = "require"
if_level = 1
if_id = "HybridBond-10um"
then_level = 0
then_ids = ["Cu-Cu-Hybrid", "SiO2-Direct"]

# 퓨전 본딩은 SiO2 직접 소재 전용
[[rule]]
type = "require"
if_level = 1
if_id = "FusionBond-1um"
then_level = 0
then_ids = ["SiO2-Direct"]

# HBM5 24단은 극미세 본딩 필요
[[rule]]
type = "require"
if_level = 4
if_id = "HBM5-24hi"
then_level = 1
then_ids = ["HybridBond-5um", "FusionBond-1um"]

# 3D SoIC는 미세 TSV 필요
[[rule]]
type = "require"
if_level = 4
if_id = "3D-SoIC-6tier"
then_level = 2
then_ids = ["TSV-3um", "NanoTSV-1um"]

# TSV-Free는 모놀리식 3D 전용
[[rule]]
type = "require"
if_level = 2
if_id = "TSV-Free"
then_level = 4
then_ids = ["Monolithic-3D"]

# 광 인터포저는 데이터센터/HPC 전용
[[rule]]
type = "exclude"
if_level = 3
if_id = "Photonic-Interposer"
then_level = 5
then_ids = ["Mobile-SoIC", "Edge-AI"]
