# =============================================================
# Compatibility Rules (호환성 규칙)
# =============================================================

# 금속 나노입자는 자기 추진 또는 광 추진 필수 (자기/광열 특성 활용)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Metallic"
then_level = 1
then_ids   = ["Magnetic", "Photonic"]

# 금속 나노입자는 생분해 불가 → 신장/간/무변형 배출
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Metallic"
then_level = 4
then_ids   = ["Renal", "Hepatic", "Excretable-Intact"]

# 광열 탑재물은 금속 플랫폼 필수 (Au 나노로드)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Photothermal"
then_level = 0
then_ids   = ["Metallic", "Carbon"]

# 자기 유도 표적화는 자기 추진과 금속 플랫폼 필요
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Magnetic-Guide"
then_level = 1
then_ids   = ["Magnetic"]

# CRISPR 탑재는 보호 캡슐 필요 → 리포솜/폴리머/실리카
[[rule]]
type       = "require"
if_level   = 3
if_id      = "CRISPR-Cas"
then_level = 0
then_ids   = ["Liposome", "Polymeric", "Silica"]

# 신장 배출은 소형 입자만 (<6nm) → 덴드리머/금속/실리카
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Renal"
then_level = 0
then_ids   = ["Dendrimer", "Metallic", "Silica", "Carbon"]

# 생분해 배출은 생분해성 플랫폼 필수
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Biodegradable"
then_level = 0
then_ids   = ["Liposome", "Polymeric", "Dendrimer"]

# 바이오하이브리드 추진은 항체/펩타이드 표적화와 호환
[[rule]]
type       = "require"
if_level   = 1
if_id      = "Biohybrid"
then_level = 0
then_ids   = ["Polymeric", "Liposome"]

# 효소 분해는 pH 감응 표적화와 시너지 (종양 미세환경)
# (선호 규칙 — 강제는 아님, 참조용 주석)
# Enzyme-Triggered + pH-Responsive = 종양 미세환경 이중 감응
