# =============================================================
# Therapeutic Nanobot DSE Domain Definition
# 치료 나노봇 — 표적 약물 전달 + 종양 치료 + 진단 통합
# n=6: Carbon Z=6 플랫폼, 6 약물군=n, 배출 경로 n=6
# σ=12 자기장 회전, J₂=24 시간 순환, τ=4 자극 반응
# Total raw combos: 6x6x6x6x6 = 7,776 (pre-filter)
# =============================================================

[meta]
name = "therapeutic-nanobot"
desc = "치료 나노봇 DSE — 플랫폼/추진/표적화/탑재물/배출 5단 아키텍처"
levels = ["Platform", "Propulsion", "Targeting", "Payload", "Clearance"]
vision = "n=6 기반 궁극의 치료 나노봇 — Carbon Z=6 + 표적 약물 전달 + 종양 제거 + 정밀 진단"

[scoring]
n6   = 0.35
perf = 0.25
power = 0.20
cost  = 0.20

