# =============================================================
# 호환성 규칙
# =============================================================

# 그림자극은 그림자 스크린 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Shadow_Puppet"
then_level = 2
then_ids   = "Shadow_Screen"

# 분라쿠는 열린 무대 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Bunraku_Full"
then_level = 2
then_ids   = "Open_Stage"

# 디지털 애니마트로닉스는 전통 서사와 비호환
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Digital_Animatronic"
then_level = 3
then_ids   = "Ritual_Sacred"
