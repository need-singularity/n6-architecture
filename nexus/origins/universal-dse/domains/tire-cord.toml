# ============================================================
# 호환성 규칙
# ============================================================

# 트럭 TBR은 4플라이 이상 카카스 필요
[[rule]]
type = "require"
if_level = 4
if_id = "Truck-TBR"
then_level = 2
then_ids = ["Radial-4ply", "Bias-6ply"]

# 에어리스 타이어는 에어리스 카카스만 호환
[[rule]]
type = "require"
if_level = 4
if_id = "Airless-City"
then_level = 2
then_ids = ["Airless"]

# 아라미드 소재는 딥처리 필수
[[rule]]
type = "require"
if_level = 0
if_id = "Aramid"
then_level = 1
then_ids = ["Dip-Treated"]

# 열세팅은 나일론 전용
[[rule]]
type = "require"
if_level = 1
if_id = "HeatSet-144C"
then_level = 0
then_ids = ["Nylon66", "Nylon6"]

# 프리스트레치는 PET 전용
[[rule]]
type = "require"
if_level = 1
if_id = "PreStretched"
then_level = 0
then_ids = ["PET"]

# 1플라이 카카스는 트럭/OTR 비호환
[[rule]]
type = "exclude"
if_level = 2
if_id = "Radial-1ply"
then_level = 4
then_ids = ["Truck-TBR", "OTR"]
