# =============================================================
# 호환성 규칙
# =============================================================

# 피노 누아는 석회암 떼루아와 최적
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Pinot_Noir"
then_level = 1
then_ids   = "Limestone_Chalk,Clay_Heavy"

# 기계 수확은 샹파뉴 전통법과 비호환
[[rule]]
type       = "exclude"
if_level   = 3
if_id      = "Machine_Harvest"
then_level = 4
then_ids   = "Champagne_Method"

# 아이스와인은 늦수확 카테고리와 양조 무관
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Ice_Wine"
then_level = 4
then_ids   = "White_Press,Natural_Wine"
