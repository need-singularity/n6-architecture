# ============================================================
# 호환성 규칙
# ============================================================

# TBM 공법은 세그먼트 지보 필요
[[rule]]
type = "require"
if_level = 0
if_id = "TBM-6m"
then_level = 1
then_ids = ["Segment-6piece"]

[[rule]]
type = "require"
if_level = 0
if_id = "TBM-12m"
then_level = 1
then_ids = ["Segment-6piece"]

# NATM은 숏크리트+록볼트 조합
[[rule]]
type = "exclude"
if_level = 0
if_id = "NATM-5step"
then_level = 1
then_ids = ["Segment-6piece"]

# 해저터널은 이중 라이닝 필수
[[rule]]
type = "require"
if_level = 4
if_id = "Subsea"
then_level = 2
then_ids = ["DoubleLining", "SteelLining"]

# 개착식은 세그먼트 미사용 (박스구조)
[[rule]]
type = "exclude"
if_level = 0
if_id = "CutCover"
then_level = 1
then_ids = ["Segment-6piece", "Forepoling-12m"]

# 자체방수는 지하 데이터센터/공동구 전용 (저수압 환경)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Integral-WP"
then_level = 4
then_ids = ["Subsea"]
