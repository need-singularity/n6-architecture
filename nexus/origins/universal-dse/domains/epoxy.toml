# ============================================================
# 호환성 규칙
# ============================================================

# 반도체 봉지재는 잠재 경화제 + 실리카 충진 필요
[[rule]]
type = "require"
if_level = 4
if_id = "Semiconductor-EMC"
then_level = 1
then_ids = ["Latent", "Anhydride"]

[[rule]]
type = "require"
if_level = 4
if_id = "Semiconductor-EMC"
then_level = 3
then_ids = ["SilicaFiller"]

# 항공 CFRP는 오토클레이브 또는 RTM 경화 필요
[[rule]]
type = "require"
if_level = 4
if_id = "Aerospace-CFRP"
then_level = 2
then_ids = ["Autoclave-6bar", "RTM"]

# 항공 CFRP는 탄소섬유 필수
[[rule]]
type = "require"
if_level = 4
if_id = "Aerospace-CFRP"
then_level = 3
then_ids = ["CF-6K", "CF-12K"]

# UV 경화는 지환식/바이오 수지 전용
[[rule]]
type = "require"
if_level = 2
if_id = "UV-Cure"
then_level = 0
then_ids = ["Cycloaliphatic", "Bio-Epoxy"]

# 그래핀 충진은 코팅/접착 비호환 (분산 어려움)
[[rule]]
type = "exclude"
if_level = 3
if_id = "Graphene"
then_level = 4
then_ids = ["Coating-Marine", "Adhesive-Structural"]
