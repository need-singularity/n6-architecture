# =============================================================
# 호환성 규칙
# =============================================================

# 브리슬콘 소나무는 통계적 교차 연대측정 필수
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Bristlecone_Pine"
then_level = 3
then_ids   = "Crossdating_Visual,Statistical_COFECHA"

# 동위원소 분석은 영상 분석과 비호환 (다른 기법)
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "Isotope_d13C"
then_level = 3
then_ids   = "Image_Analysis"

# 고고학 응용은 참나무 수종과 최적 조합
[[rule]]
type       = "require"
if_level   = 4
if_id      = "Archaeology"
then_level = 0
then_ids   = "Oak_Quercus,Douglas_Fir"
