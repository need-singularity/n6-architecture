# =============================================================
# 호환성 규칙
# =============================================================

# M.9 왜성 대목은 세장방추형/초세장형 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "M9_Dwarf"
then_level = 2
then_ids   = "Spindle_Slender,Tall_Spindle"

# 복숭아는 CA 저장 비호환 (단기 유통)
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Peach_Prunus"
then_level = 4
then_ids   = "CA_Storage"

# 에틸렌 급등형은 1-MCP 처리와 최적
[[rule]]
type       = "require"
if_level   = 3
if_id      = "Ethylene_Gas"
then_level = 4
then_ids   = "SmartFresh_1MCP,CA_Storage"
