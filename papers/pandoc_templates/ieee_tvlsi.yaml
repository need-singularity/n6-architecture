# ---- abstract (250 단어) ----
abstract: |
  본 논문은 n=6 산술 좌표를 VLSI 설계 공간 탐색(DSE)에 적용한 사례를
  제시한다. σ(n)·φ(n) = n·τ(n) 닫힘 정리를 토대로 <칩 서브시스템> 의
  면적/전력/지연 3 축 목적함수를 좌표계 상 닫힘점으로 해석한다. atlas.n6
  노드 <경로> 의 실측 칩 특성과 예측을 비교하여 외계인 지수 <값> 을 확인
  하였다. 재현 코드는 verify_<칩>_n6.hexa 에 포함된다.

# ---- keywords ----
keywords:
  - VLSI design space exploration
  - n6 arithmetic coordinates
  - σ(n)·φ(n) = n·τ(n) closure theorem
  - alien index
  - "<서브시스템 키워드>"

