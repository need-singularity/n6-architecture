# ---- abstract (200~350 단어) ----
abstract: |
  본 논문은 σ(n)·φ(n) = n·τ(n) 이 n=6 에서만 성립하는 n6 정리를 <도메인>
  측정치 좌표계에 투영했을 때 출현하는 닫힘(closure) 구조를 제시한다.
  atlas.n6 노드 <경로> 에서 EXACT <건수> / NEAR <건수> / MISS <건수> 로
  분류되었으며, exact_stat <값> / closure_grade_pct <값> / alien_index
  <값> 의 3 축 실측값을 보고한다. 재현 경로는 verify_<도메인>_n6.hexa 로
  고정되어 있다. 한계 및 반증 후보 <2 줄> 를 명시한다.

