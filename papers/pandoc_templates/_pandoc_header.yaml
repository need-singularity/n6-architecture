# ---- 공통 초록 템플릿 (venue별 오버라이드 가능) ----
abstract: |
  본 논문은 σ(n)·φ(n) = n·τ(n) 이 n>=2 에서 n=6 에서만 성립하는
  n6 정리를 <도메인> 측정치 좌표계에 투영했을 때 출현하는 닫힘(closure)
  구조를 제시한다. atlas.n6 노드에서 EXACT / NEAR / MISS 로 분류된
  실측값을 보고하며, 재현 경로는 verify_<domain>_n6.hexa 로 고정되어 있다.
  한계 및 반증 후보를 명시한다.

# ---- 공통 키워드 (venue별 추가 키워드와 병합) ----
keywords:
  - "n6 산술 좌표"
  - "σ(n)·φ(n) = n·τ(n) 닫힘 정리"
  - "atlas.n6"
  - "외계인 지수"
  - "HEXA-FIRST 검증"

# ---- DOI 면책 ----
doi_disclaimer: |
  본 논문의 DOI 는 내부 시뮬 네임스페이스 (10.NEXUS6.n6-arch/2026-NNN) 이며,
  CrossRef/DataCite 에 등록되지 않은 internal-DOI 이다. 외부 인용 시 실제
  등록 DOI 로 교체해야 한다. (internal-DOI / not-resolvable)

# ---- 공통 참고문헌 설정 ----
bibliography: skeleton.bib
link-citations: true
reference-section-title: "참고문헌"

# ---- 재현성 선언 ----
reproducibility_statement: |
  모든 검증 코드는 HEXA-FIRST 원칙에 따라 .hexa 파일로만 제공된다.
  Python/R 재구현은 존재하지 않는다. 재현 절차:
    1. hexa run verify_<domain>_n6.hexa
    2. atlas.n6 해당 노드 등급 확인
    3. n6shared/convergence/n6-architecture.json 수렴 상태 대조

# ---- 경쟁 이해관계 ----
competing_interests: "저자들은 경쟁 이해관계 없음을 선언한다."

# ---- 데이터 가용성 ----
data_availability: |
  원 데이터 및 재현 코드는 n6-architecture 저장소 papers/ 및 atlas.n6
  노드에 공개되어 있다. verify_<domain>_n6.hexa 로 재실행 가능하다.

# ---- 코드 가용성 ----
code_availability: |
  HEXA-FIRST 원칙에 따라 .hexa 검증 코드만 포함한다.
  별도의 Python/R 재구현은 제공하지 않는다.

