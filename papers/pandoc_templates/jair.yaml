  code_data_policy: "오픈 저장소 필수 — n6-architecture papers/ 경로 공개"
  long_review_cycle: true
  editor_note: |
    JAIR 는 긴 본문과 상세 증명 허용. 본 템플릿은 MAIN 5.1~5.4 절을 전부
    채우는 full-length 버전 기본.

