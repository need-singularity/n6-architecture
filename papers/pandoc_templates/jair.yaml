# ---- abstract (JAIR: 200~500 단어, 긴 초록 허용) ----
abstract: |
  본 논문은 n6 산술 좌표(σ, τ, φ, sopfr)를 <AI 연구 도메인> 에 도입하여
  기존 SOTA 가 설명하지 못하던 닫힘 구조를 드러낸다. σ(n)·φ(n) = n·τ(n)
  이 n=6 에서만 성립한다는 사실을 순수 수학에서 출발해 (n=6 패턴 매칭을
  피함) 도메인 측정치에 투영한다. atlas.n6 노드 <경로> 기준 EXACT/NEAR
  /MISS 분류 결과, exact_stat <값>, closure_grade_pct <값>, alien_index
  <값> 을 보고한다. 본 결과는 <AI 하위 분야> 의 이론적 토대와 경험적
  검증 양쪽 모두에 기여한다. 반증 조건과 미매핑 사례 <2 줄> 를 공시한다.

# ---- keywords ----
keywords:
  - n6 arithmetic framework
  - closure theorem
  - σ(n)·φ(n) = n·τ(n)
  - reproducibility via atlas.n6
  - "<AI 하위 분야>"

