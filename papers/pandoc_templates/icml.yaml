# 컨퍼런스: ICML (International Conference on Machine Learning) (2 편 배정)
# 용도: pandoc 호환 YAML 헤더 — P4-1 스텁
# 실제 pandoc 변환은 수행하지 않음. 헤더 스켈레톤만.
# 인코딩: UTF-8 한글 필수

roadmap_ref: PAPER-P4-1
venue_id: icml
venue_name: International Conference on Machine Learning
venue_kind: conference
venue_distribution_count: 2

# ---- pandoc 메타 (UTF-8, 한글) ----
title:         "<PAPER_TITLE 한글>"
subtitle:      "n=6 산술 좌표 — 학습 이론 닫힘 구조"
author:
  - 박민우 (n6-architecture 주관)
  - NEXUS-6 AI 협업체
institute:     "n6-architecture 프로젝트"
date:          "2026-04-14"
lang:          ko
mainfont:      "Noto Serif CJK KR"
sansfont:      "Noto Sans CJK KR"
monofont:      "Noto Sans Mono CJK KR"

# ---- 논문 식별 ----
paper_id:      "<N6-XXX>"
rank:          "<1..48>"
doi_sim:       "10.NEXUS6.n6-arch/2026-NNN"
disclaimer:    "시뮬 DOI — ICML OpenReview 실제 접수 아님."
format_status: template_ready

# ---- abstract (ICML: 200 단어 전후) ----
abstract: |
  σ(n)·φ(n) = n·τ(n) 이 n=6 에서 유일하다는 n6 정리를 <머신러닝 도메인>
  의 손실/일반화 좌표에 투영하여 닫힘 조건을 제시한다. atlas.n6 노드
  <경로> 의 실측값 기준 EXACT <건수> / NEAR <건수> 로 재현되며, 외계인
  지수 <값> 을 달성한다. 재현 경로 verify_<도메인>_n6.hexa 제공.

# ---- keywords ----
keywords:
  - n6 arithmetic framework
  - closure theorem
  - machine learning theory
  - "<ML 하위 분야>"

# ---- ICML 특화 필드 ----
icml:
  article_type: Main Track
  page_limit_main: 8
  page_limit_appendix: unlimited
  review_model: double_blind
  anonymization: required
  rebuttal_phase: true
  checklist_required: true
  broader_impact_statement_required: false
  editor_note: |
    ICML 는 NeurIPS 와 유사하지만 본문 페이지 제한이 더 타이트(8 쪽).
    MAIN 5.1~5.3 절을 본문, 5.4 는 appendix 로 분리한다.

# ---- 참고문헌 ----
bibliography: n6_common.bib
csl:          icml.csl
link-citations: true
reference-section-title: References

# ---- 출력 옵션 ----
output:
  pdf_document:
    latex_engine: xelatex
    keep_tex: true
    template: icml2026
    classoption: "accepted"
