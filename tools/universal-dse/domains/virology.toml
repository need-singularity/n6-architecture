# =============================================================
# 호환성 규칙 (Compatibility Rules)
# =============================================================

# 역전사 복제는 ssRNA-RT 또는 dsDNA-RT 게놈만 가능
[[rule]]
type       = "require"
if_level   = 2
if_id      = "ReverseTranscription"
then_level = 1
then_ids   = "ssRNA_RT,dsDNA_RT"

# 분절형 복제는 dsRNA 또는 ssRNA(-) 게놈에서만 발생
[[rule]]
type       = "require"
if_level   = 2
if_id      = "Segmented"
then_level = 1
then_ids   = "dsRNA,ssRNAminus"

# 복합형 구조는 dsDNA 게놈에서만 (폭스/파지)
[[rule]]
type       = "require"
if_level   = 0
if_id      = "Complex"
then_level = 1
then_ids   = "dsDNA"

# ssDNA 게놈은 핵내 복제 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "ssDNA"
then_level = 2
then_ids   = "Nuclear"

# 외피형 구조의 호흡기 감염이 가장 흔함 (제한 아닌 선호)
# 나선형은 복합형 대응 제외
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "Helical"
then_level = 4
then_ids   = "Quarantine"

# 이십면체 T=1 소형 바이러스는 면역치료 단독 대응 비효율
[[rule]]
type       = "exclude"
if_level   = 0
if_id      = "IcosaT1"
then_level = 4
then_ids   = "Immunotherapy"

# dsDNA-RT (HBV)는 혈행성 감염 필수
[[rule]]
type       = "require"
if_level   = 1
if_id      = "dsDNA_RT"
then_level = 3
then_ids   = "BloodBorne"

# 벡터 매개 감염은 ssRNA(+) 또는 ssRNA(-) 게놈 필수 (아르보바이러스)
[[rule]]
type       = "require"
if_level   = 3
if_id      = "VectorBorne"
then_level = 1
then_ids   = "ssRNAplus,ssRNAminus"

# 백신 대응에서 복합형 구조 제외 (폭스 = 천연두 근절 완료)
[[rule]]
type       = "exclude"
if_level   = 4
if_id      = "Vaccine"
then_level = 0
then_ids   = "Complex"
