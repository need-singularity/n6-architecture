# =============================================================
# ROBO DSE Domain Definition — 8-Level Ultimate Architecture
# Robotics & Embodied Intelligence
# Chain: Material -> Actuator -> Joint -> CtrlChip -> Body -> Mind -> Swarm -> Ultimate
# BT-123~117 coverage
# Total raw combos: 6x6x5x5x5x5x4x3 = 270,000 (pre-filter)
# =============================================================

[meta]
name = "robotics-ultimate"
desc = "Ultimate Robotics Architecture DSE — 8 levels from atomic material to swarm intelligence"
levels = ["Material", "Actuator", "Joint", "CtrlChip", "Body", "Mind", "Swarm", "Ultimate"]
vision = "n=6 embodied intelligence -- Z=6 material to 96/192 robot-compute unification"

[scoring]
n6   = 0.25
perf = 0.25
power = 0.20
cost  = 0.15
weight = 0.15

