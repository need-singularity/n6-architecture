# =============================================================
# Compatibility Rules
# =============================================================

# SE(3) joint requires rigid material
[[rule]]
type       = "exclude"
if_level   = 2
if_id      = "6DOF_SE3"
then_level = 0
then_ids   = "PolymerSoft"

# Quadruped body requires quadruped joint
[[rule]]
type       = "require"
if_level   = 4
if_id      = "QuadSigma12"
then_level = 2
then_ids   = "Quad3DOF"

# Hexapod body requires hexapod joint
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HexapodN6"
then_level = 2
then_ids   = "Hexapod18"

# Hexacopter doesn't use joint level meaningfully
[[rule]]
type       = "require"
if_level   = 4
if_id      = "HexacopterN6"
then_level = 1
then_ids   = "BLDC12,DirectDrive24"

# Hydraulic only for rigid bodies
[[rule]]
type       = "exclude"
if_level   = 1
if_id      = "Hydraulic6"
then_level = 0
then_ids   = "PolymerSoft"

# BT56 VLM needs capable chip
[[rule]]
type       = "require"
if_level   = 5
if_id      = "BT56_VLM"
then_level = 3
then_ids   = "HEXA1_SoC,JetsonOrin"

# Omega integration requires swarm
[[rule]]
type       = "exclude"
if_level   = 7
if_id      = "Omega96"
then_level = 6
then_ids   = "Solo"

# Solo swarm with Standard integration
[[rule]]
type       = "require"
if_level   = 7
if_id      = "Standard"
then_level = 6
then_ids   = "Solo,CloudFleet"
