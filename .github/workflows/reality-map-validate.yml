# ═══════════════════════════════════════════════════════════════
# atlas.n6 검증 워크플로 (구 reality_map.json 검증 → atlas.n6 전환)
# - 파일 존재 + 최소 줄 수
# - 등급 분포 + [10*](EXACT) 비율 계산
# - 섹션 헤더 개수 리포트
# ═══════════════════════════════════════════════════════════════
name: Atlas Validation

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  validate-atlas:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Validate atlas.n6
        run: |
          set -e
          # 경로 탐색
          PATH_FILE=""
          for c in "shared/n6/atlas.n6" "docs/atlas.n6"; do
            if [ -f "$c" ]; then PATH_FILE="$c"; break; fi
          done

          if [ -z "$PATH_FILE" ]; then
            echo "atlas.n6 not found in shared/n6/ or docs/ -- skipping"
            exit 0
          fi

          echo "Validating: $PATH_FILE"

          # 1) 파일 크기 + 줄 수
          LINES=$(wc -l < "$PATH_FILE")
          BYTES=$(wc -c < "$PATH_FILE")
          echo "  Lines: $LINES"
          echo "  Bytes: $BYTES"

          if [ "$LINES" -lt 1000 ]; then
            echo "FAIL: atlas.n6 too small ($LINES lines, expected 1000+)"
            exit 1
          fi

          # 2) 등급 분포 + EXACT 비율
          awk 'match($0,/\[([0-9]+)([*!?]*)\]/,a){
            g=a[1]; mod=a[2]
            if(mod~/\*/) ex++
            else if(g=="10") ex++
            else if(g=="9") ne++
            else if(g+0>=5) emp++
            else if(mod~/\?/) conj++
            n++
          } END{
            pct = n ? ex/n*100 : 0
            printf "  === Atlas Report ===\n"
            printf "  Graded entries: %d\n", n
            printf "  EXACT [10*]:    %d (%.1f%%)\n", ex, pct
            printf "  NEAR  [9]:      %d\n", ne
            printf "  EMPIRICAL [5-8]: %d\n", emp
            printf "  CONJECTURE [?]: %d\n", conj
            if (n < 100) { print "FAIL: insufficient graded entries"; exit 1 }
            if (pct < 50) { print "FAIL: EXACT ratio too low"; exit 1 }
            print "PASS: atlas.n6 is valid"
          }' "$PATH_FILE"

          # 3) 섹션 헤더
          SECTIONS=$(grep -c "^# ══" "$PATH_FILE" || echo 0)
          echo "  Sections: $SECTIONS"
